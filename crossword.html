<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crossword - Game Hub</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    :root {
      --bg: #080b18;
      --panel: rgba(15, 20, 45, 0.78);
      --text: #eef4ff;
      --muted: #95a3c7;
      --accent: #5df2ff;
      --accent-2: #b46bff;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.45);
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(93, 242, 255, 0.24), transparent 28rem),
        radial-gradient(circle at 85% 20%, rgba(180, 107, 255, 0.24), transparent 30rem),
        linear-gradient(135deg, #070916 0%, #0b1028 48%, #11091f 100%);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 88%);
    }
    .app {
      width: min(1240px, calc(100% - 24px));
      height: 100vh;
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      overflow: hidden;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 42px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      font-size: 1.2rem;
      text-decoration: none;
      color: inherit;
    }
    .logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 32px rgba(93, 242, 255, 0.32);
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 700;
    }
    nav a:hover { color: var(--accent); }

    .controls-container {
      display: grid;
      grid-template-columns: auto minmax(160px, 1fr) auto;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.02);
      padding: 10px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden;
    }
    .level-readout {
      text-align: center;
      font-weight: 900;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .level-readout small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
    }
    .selector-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      padding: 8px 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 180ms ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }
    .selector-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }
    .selector-btn.active {
      background: linear-gradient(135deg, rgba(93, 242, 255, 0.18), rgba(180, 107, 255, 0.18));
      border-color: var(--accent);
      color: var(--accent);
    }
    .selector-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      border-color: transparent;
      background: rgba(0, 0, 0, 0.2);
    }

    .game-layout {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 18px;
      align-items: stretch;
      overflow: hidden;
    }
    @media (max-width: 960px) {
      .game-layout {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) 210px;
      }
    }

    .grid-container {
      min-height: 0;
      background: linear-gradient(180deg, var(--panel), rgba(6, 9, 24, 0.86));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      display: grid;
      grid-template-rows: 1fr auto auto;
      align-items: center;
      justify-items: center;
      overflow: hidden;
    }
    .grid-scroll-wrapper {
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4px;
    }
    .crossword-grid {
      --cell-size: 44px;
      --cell-gap: 4px;
      display: grid;
      gap: var(--cell-gap);
      background: rgba(6, 9, 24, 0.5);
      padding: 8px;
      border-radius: 12px;
      flex: 0 0 auto;
    }

    .cell {
      position: relative;
      width: var(--cell-size);
      height: var(--cell-size);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .cell.black {
      background: rgba(5, 7, 16, 0.85);
      border-color: transparent;
    }
    .cell input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      min-width: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      border: none;
      text-align: center;
      font-size: clamp(0.72rem, calc(var(--cell-size) * 0.38), 1.05rem);
      line-height: var(--cell-size);
      font-weight: 800;
      color: var(--text);
      text-transform: uppercase;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .cell:focus-within:not(.black) {
      border-color: var(--accent);
      background: rgba(93, 242, 255, 0.08);
      box-shadow: 0 0 12px rgba(93, 242, 255, 0.2);
    }
    .cell-num {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--muted);
      pointer-events: none;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      width: 100%;
      max-width: 560px;
    }
    .btn {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      transition: transform 150ms ease, opacity 150ms ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9efcff);
      color: #06101a;
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); }
    .btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
    }

    .clues-container {
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 14px;
      overflow: hidden;
    }
    .clue-box {
      min-height: 0;
      background: linear-gradient(180deg, var(--panel), rgba(6, 9, 24, 0.86));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .clue-box h2 {
      margin: 0 0 10px;
      font-size: 0.98rem;
      color: var(--accent-2);
      text-transform: uppercase;
      font-weight: 800;
    }
    .clue-box.across h2 { color: var(--accent); }
    .clue-list {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 7px 10px;
      overflow: hidden;
      align-content: start;
    }
    .clue-item { display: flex; gap: 8px; font-size: clamp(0.72rem, 1.1vw, 0.88rem); line-height: 1.22; }
    .clue-item span:first-child { font-weight: 900; color: var(--accent); min-width: 18px; }
    .clue-box.down h2 + .clue-list .clue-item span:first-child { color: var(--accent-2); }
    .clue-text { color: var(--muted); }

    .status-msg { margin-top: 6px; font-weight: 700; min-height: 20px; text-align: center; font-size: 0.9rem; }
    .success { color: #5dff9d; }
    .fail { color: #ff5370; }

    @media (max-height: 720px) {
      .brand { font-size: 1rem; }
      .logo { width: 34px; height: 34px; border-radius: 11px; }
      .selector-btn { padding: 6px 10px; font-size: 0.8rem; }
      .clue-box { padding: 10px; }
      .clue-box h2 { font-size: 0.86rem; margin-bottom: 7px; }
      .btn { padding: 8px; font-size: 0.82rem; }
    }
  

/* === UI REDESIGN: Neon Arcade Console Theme === */
:root {
  --bg: #050814;
  --panel: rgba(12, 18, 42, 0.72);
  --panel-2: rgba(255,255,255,0.075);
  --text: #f4f8ff;
  --muted: #aab7df;
  --accent: #50f4ff;
  --accent-2: #c77dff;
  --warning: #ff5d7a;
  --danger: #ff5d7a;
  --good: #5dffb0;
  --shadow: 0 24px 80px rgba(0,0,0,.48);
  --ring: 0 0 0 1px rgba(80,244,255,.22), 0 0 36px rgba(80,244,255,.12);
}
html { color-scheme: dark; }
body {
  background:
    radial-gradient(circle at 8% 8%, rgba(80,244,255,.28), transparent 24rem),
    radial-gradient(circle at 92% 18%, rgba(199,125,255,.25), transparent 26rem),
    radial-gradient(circle at 52% 105%, rgba(93,255,176,.12), transparent 22rem),
    linear-gradient(140deg, #030611 0%, #090e25 48%, #180a26 100%) !important;
}
body::before {
  opacity: .75;
  background-size: 34px 34px !important;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(255,255,255,.045), transparent 18%, rgba(0,0,0,.22));
  mix-blend-mode: screen;
  opacity: .36;
}
.app {
  isolation: isolate;
}
header, .hero, .game-shell, .layout, .game-layout, .grid, .controls-container {
  position: relative;
  z-index: 1;
}
header {
  padding: 10px 12px;
  border: 1px solid rgba(255,255,255,.10);
  border-radius: 24px;
  background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.025));
  box-shadow: 0 18px 50px rgba(0,0,0,.25);
  backdrop-filter: blur(16px) saturate(130%);
}
.brand, .home-link, nav a {
  text-shadow: 0 0 20px rgba(80,244,255,.14);
}
.logo {
  border-radius: 12px !important;
  background:
    linear-gradient(135deg, rgba(255,255,255,.28), transparent 40%),
    linear-gradient(135deg, var(--accent), var(--accent-2)) !important;
  box-shadow: 0 0 28px rgba(80,244,255,.34), inset 0 0 18px rgba(255,255,255,.18) !important;
}
nav a, .home-link {
  display: inline-flex;
  align-items: center;
  min-height: 34px;
  padding: 8px 12px;
  border-radius: 999px;
  color: var(--muted) !important;
  background: rgba(255,255,255,.045);
  border: 1px solid rgba(255,255,255,.07);
  transition: transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease;
}
nav a:hover, .home-link:hover {
  color: var(--text) !important;
  background: rgba(80,244,255,.12);
  border-color: rgba(80,244,255,.32);
  transform: translateY(-1px);
  text-decoration: none !important;
}
.eyebrow {
  color: var(--accent) !important;
  text-shadow: 0 0 18px rgba(80,244,255,.35);
}
h1 {
  background: linear-gradient(135deg, #ffffff 0%, #dffbff 42%, var(--accent) 72%, var(--accent-2) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent !important;
  text-shadow: none !important;
}
h1 span { color: inherit !important; }
.subtitle, .section-title p, .modal-note, .rules, .message, .clue-text, .stats span, .card h2 {
  color: var(--muted) !important;
}
.card, .board-wrap, .side, .grid-container, .clue-box, .game-card, .modal-card, .modal-content, .stat, .controls-container, .tracker-panel {
  background:
    linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.025)),
    linear-gradient(135deg, rgba(80,244,255,.07), rgba(199,125,255,.055)),
    rgba(7, 12, 31, .72) !important;
  border: 1px solid rgba(255,255,255,.13) !important;
  box-shadow: var(--shadow), var(--ring) !important;
  backdrop-filter: blur(18px) saturate(135%) !important;
}
.card, .board-wrap, .side, .grid-container, .clue-box, .game-card, .modal-card, .modal-content, .stat, .controls-container, .tracker-panel {
  border-radius: 22px !important;
}
button, .btn, .selector-btn, .play, .control-button, #saveControlBtn {
  border: 1px solid rgba(255,255,255,.16) !important;
  background: linear-gradient(135deg, var(--accent), #9ffcff) !important;
  color: #05101d !important;
  font-weight: 900 !important;
  box-shadow: 0 0 24px rgba(80,244,255,.22) !important;
  letter-spacing: .01em;
}
button.secondary, .btn-secondary, .modal-close, #cancelControlBtn, #resetControlBtn, .selector-btn {
  color: var(--text) !important;
  background: rgba(255,255,255,.075) !important;
  box-shadow: none !important;
}
button:hover:not(:disabled), .btn:hover:not(:disabled), .selector-btn:hover:not(:disabled), .play:hover {
  transform: translateY(-2px) scale(1.01) !important;
  filter: brightness(1.06);
}
button:disabled, .btn:disabled, .selector-btn:disabled {
  opacity: .36 !important;
  filter: grayscale(.6);
}
.overlay, .modal-backdrop {
  background: rgba(2, 6, 19, .78) !important;
  backdrop-filter: blur(12px) saturate(130%);
}
.overlay h2, .panel-title, .level-readout, .clue-box h2, .card h2 {
  letter-spacing: .02em;
}
@media (max-width: 720px) {
  header { border-radius: 18px; }
  nav { display: flex; flex-wrap: wrap; gap: 8px; }
  nav a { margin: 0 !important; }
}

  <script>
    (function () {
      const DB_URL = "https://gamehubss-default-rtdb.firebaseio.com/";
      const SESSION_KEY = "gamehub_current_user";
      const LOCAL_USER_KEY = "__gamehub_local_user__";
      const GAMEHUB_KEYS = ["gamehub_profile_v1",
        "tetris_highScore", "tetris_highLevel", "tetris_keyMap",
        "sudoku_v2_visited", "sudoku_v2_save_state",
        "crossword_progression", "crossword_reveal_used_at", "crossword_hint_usage_v1"
      ];

      function safeUsernameKey(username) {
        return String(username || "").trim().toLowerCase().replace(/[^a-z0-9_]/g, "_");
      }
      function getCurrentUser() {
        try { return JSON.parse(sessionStorage.getItem(SESSION_KEY) || "null"); }
        catch (err) { return null; }
      }
      function firebaseUrl(parts) {
        return DB_URL.replace(/\/$/, "") + "/" + parts.map(encodeURIComponent).join("/") + ".json";
      }
      const currentUser = getCurrentUser();
      if (!currentUser || !currentUser.username) {
        window.location.replace("index");
        return;
      }
      const userKey = safeUsernameKey(currentUser.username);
      const originalSetItem = localStorage.setItem.bind(localStorage);
      const originalRemoveItem = localStorage.removeItem.bind(localStorage);

      function cloudSet(key, value) {
        if (key === LOCAL_USER_KEY) return;
        fetch(firebaseUrl(["users", userKey, "gameData", key]), {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(String(value))
        }).catch(function (err) { console.warn("Firebase save failed:", err); });
        fetch(firebaseUrl(["users", userKey, "lastActiveAt"]), {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(new Date().toISOString())
        }).catch(function () {});
      }
      function cloudRemove(key) {
        if (key === LOCAL_USER_KEY) return;
        fetch(firebaseUrl(["users", userKey, "gameData", key]), { method: "DELETE" })
          .catch(function (err) { console.warn("Firebase remove failed:", err); });
      }

      localStorage.setItem = function (key, value) {
        originalSetItem(key, value);
        cloudSet(key, value);
      };
      localStorage.removeItem = function (key) {
        originalRemoveItem(key);
        cloudRemove(key);
      };

      window.GameHubAuth = {
        dbUrl: DB_URL,
        user: currentUser,
        username: currentUser.username,
        safeUsernameKey: safeUsernameKey,
        logout: function () {
          sessionStorage.removeItem(SESSION_KEY);
          window.location.href = "/";
        },
        saveNow: function () {
          GAMEHUB_KEYS.forEach(function (key) {
            const value = localStorage.getItem(key);
            if (value !== null) cloudSet(key, value);
          });
        }
      };
    })();
  </script>

  <script>
    (function () {
      const PROFILE_KEY = "gamehub_profile_v1";
      const MAX_RECENT = 12;
      const MAX_PROFILE_LEVEL = 100;

      function nowIso() { return new Date().toISOString(); }
      function getUsername() {
        return (window.GameHubAuth && window.GameHubAuth.username) || "Player";
      }
      function blankGame() {
        return { successes: 0, bestScore: 0, bestLevel: 0, lastPlayedAt: null };
      }
      function clampLevel(level) {
        return Math.max(1, Math.min(MAX_PROFILE_LEVEL, Math.floor(Number(level) || 1)));
      }
      function xpGapForLevel(level) {
        level = clampLevel(level);
        if (level >= MAX_PROFILE_LEVEL) return 0;
        if (level === 1) return 250;
        return 325 + ((level - 2) * 60);
      }
      function xpForLevelStart(level) {
        level = clampLevel(level);
        let total = 0;
        for (let lv = 1; lv < level; lv++) total += xpGapForLevel(lv);
        return total;
      }
      function xpForNext(level) {
        level = clampLevel(level);
        if (level >= MAX_PROFILE_LEVEL) return xpForLevelStart(MAX_PROFILE_LEVEL);
        return xpForLevelStart(level) + xpGapForLevel(level);
      }
      function levelFromXp(totalXp) {
        const xp = Math.max(0, Number(totalXp) || 0);
        let level = 1;
        while (level < MAX_PROFILE_LEVEL && xp >= xpForNext(level)) level++;
        return level;
      }
      function xpRangeForLevel(level) {
        level = clampLevel(level);
        const start = xpForLevelStart(level);
        const end = level >= MAX_PROFILE_LEVEL ? start : xpForNext(level);
        return { level, start, end, gap: Math.max(0, end - start), isMax: level >= MAX_PROFILE_LEVEL };
      }
      function defaultProfile() {
        const username = getUsername();
        return {
          username,
          displayName: username,
          avatar: "🎮",
          mainLevel: 1,
          mainXp: 0,
          level: 1,
          xp: 0,
          successfulPlays: 0,
          createdAt: nowIso(),
          updatedAt: nowIso(),
          games: {},
          recentActivity: [],
          completedSuccessIds: {}
        };
      }
      function normalizeProfile(profile) {
        const base = defaultProfile();
        profile = profile && typeof profile === "object" ? profile : base;
        profile.username = getUsername();
        profile.displayName = profile.displayName || profile.username;
        profile.avatar = profile.avatar || "🎮";
        profile.games = profile.games && typeof profile.games === "object" ? profile.games : {};
        profile.recentActivity = Array.isArray(profile.recentActivity) ? profile.recentActivity : [];
        profile.completedSuccessIds = profile.completedSuccessIds && typeof profile.completedSuccessIds === "object" ? profile.completedSuccessIds : {};
        profile.successfulPlays = Math.max(0, Number(profile.successfulPlays || 0));

        // One source of truth for the account level:
        // mainXp/mainLevel are the official account values. level/xp stay as aliases for older pages.
        const officialXp = Math.max(0, Number(profile.mainXp ?? profile.xp ?? 0) || 0);
        const officialLevel = levelFromXp(officialXp);
        profile.mainXp = officialXp;
        profile.xp = officialXp;
        profile.mainLevel = officialLevel;
        profile.level = officialLevel;
        profile.updatedAt = profile.updatedAt || nowIso();
        profile.createdAt = profile.createdAt || nowIso();
        return profile;
      }
      function readProfile() {
        let profile = null;
        try { profile = JSON.parse(localStorage.getItem(PROFILE_KEY) || "null"); }
        catch (err) { profile = null; }
        profile = normalizeProfile(profile);
        try {
          const normalized = JSON.stringify(profile);
          if (localStorage.getItem(PROFILE_KEY) !== normalized) localStorage.setItem(PROFILE_KEY, normalized);
        } catch (err) {}
        return profile;
      }
      function saveProfile(profile) {
        profile = normalizeProfile(profile);
        profile.updatedAt = nowIso();
        localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
        return profile;
      }
      function showToast(text) {
        if (!document.body) return;
        if (window.GameHubModal && typeof window.GameHubModal.toast === "function") {
          window.GameHubModal.toast(text);
          return;
        }
        const toast = document.createElement("div");
        toast.textContent = text;
        toast.style.cssText = "position:fixed;right:18px;bottom:18px;z-index:9999;padding:13px 15px;border-radius:16px;background:linear-gradient(135deg,rgba(80,244,255,.95),rgba(199,125,255,.95));color:#05101d;font-weight:1000;box-shadow:0 18px 50px rgba(0,0,0,.34);font-family:inherit;max-width:min(340px,calc(100vw - 36px));";
        document.body.appendChild(toast);
        setTimeout(function () { toast.style.opacity = "0"; toast.style.transform = "translateY(8px)"; toast.style.transition = "all .35s ease"; }, 2400);
        setTimeout(function () { toast.remove(); }, 2850);
      }
      function recordSuccess(gameName, details) {
        details = details || {};
        const profile = readProfile();
        const successId = details.successId ? String(details.successId) : "";
        if (successId && profile.completedSuccessIds[successId]) return profile;
        if (successId) profile.completedSuccessIds[successId] = nowIso();

        const game = String(gameName || details.game || "Game");
        const xpGained = Math.max(0, Number(details.xp || 50));
        const beforeLevel = Number(profile.mainLevel || profile.level || 1);
        profile.successfulPlays += 1;
        profile.mainXp = Math.max(0, Number(profile.mainXp || profile.xp || 0)) + xpGained;
        profile.xp = profile.mainXp;
        profile.mainLevel = levelFromXp(profile.mainXp);
        profile.level = profile.mainLevel;

        if (!profile.games[game]) profile.games[game] = blankGame();
        profile.games[game].successes = Number(profile.games[game].successes || 0) + 1;
        profile.games[game].bestScore = Math.max(Number(profile.games[game].bestScore || 0), Number(details.score || 0));
        profile.games[game].bestLevel = Math.max(Number(profile.games[game].bestLevel || 0), Number(details.level || 0));
        profile.games[game].lastPlayedAt = nowIso();

        profile.recentActivity.unshift({
          game,
          title: details.title || ("Successful " + game + " play"),
          score: Number(details.score || 0),
          level: Number(details.level || 0),
          xp: xpGained,
          at: nowIso()
        });
        profile.recentActivity = profile.recentActivity.slice(0, MAX_RECENT);
        saveProfile(profile);

        if (profile.mainLevel > beforeLevel) showToast("Main Level Up! Lv " + beforeLevel + " → " + profile.mainLevel);
        else if (xpGained > 0) showToast("+" + xpGained + " XP gained");
        return profile;
      }
      function resetProfile() {
        const profile = defaultProfile();
        saveProfile(profile);
        return profile;
      }
      window.GameHubProfile = { PROFILE_KEY, MAX_PROFILE_LEVEL, readProfile, saveProfile, recordSuccess, resetProfile, xpForNext, xpForLevelStart, xpGapForLevel, xpRangeForLevel, levelFromXp };
    })();
  </script>


<script>
(function () {
  if (window.GameHubModal) return;
  function ensureStyles() {
    if (document.getElementById("gamehub-modal-styles")) return;
    const style = document.createElement("style");
    style.id = "gamehub-modal-styles";
    style.textContent = `
      .gh-modal-overlay{position:fixed;inset:0;z-index:99999;display:grid;place-items:center;padding:18px;background:rgba(2,6,19,.78);backdrop-filter:blur(12px) saturate(130%)}
      .gh-modal-card{width:min(440px,100%);border-radius:24px;padding:20px;background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.035)),linear-gradient(135deg,rgba(80,244,255,.10),rgba(199,125,255,.085)),rgba(7,12,31,.96);border:1px solid rgba(255,255,255,.16);box-shadow:0 28px 90px rgba(0,0,0,.58),0 0 0 1px rgba(80,244,255,.22),0 0 36px rgba(80,244,255,.12);color:var(--text,#f4f8ff);font-family:inherit;animation:ghModalPop .18s ease forwards}
      @keyframes ghModalPop{from{transform:translateY(10px) scale(.98);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
      .gh-modal-icon{width:44px;height:44px;display:grid;place-items:center;border-radius:16px;margin-bottom:12px;background:linear-gradient(135deg,var(--accent,#50f4ff),var(--accent-2,#c77dff));color:#06101a;font-size:1.4rem;box-shadow:0 0 28px rgba(80,244,255,.26)}
      .gh-modal-card.danger .gh-modal-icon{background:linear-gradient(135deg,#ff5d7a,#ffb65d)}
      .gh-modal-title{margin:0 0 8px;font-size:1.35rem;line-height:1.1;letter-spacing:-.04em;color:var(--text,#f4f8ff)}
      .gh-modal-message{margin:0 0 16px;color:var(--muted,#aab7df);line-height:1.5;font-size:.94rem;white-space:pre-wrap}
      .gh-modal-input{width:100%;margin:0 0 14px;padding:12px 13px;border-radius:14px;border:1px solid rgba(80,244,255,.25);background:rgba(255,255,255,.075);color:var(--text,#f4f8ff);font:inherit;font-weight:800;outline:none}
      .gh-modal-actions{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
      .gh-modal-btn{border-radius:999px;padding:10px 16px;border:1px solid rgba(255,255,255,.15);font-weight:1000;cursor:pointer;font:inherit}
      .gh-modal-btn.cancel{color:var(--text,#f4f8ff);background:rgba(255,255,255,.075)}
      .gh-modal-btn.confirm{color:#06101a;background:linear-gradient(135deg,var(--accent,#50f4ff),#9ffcff);box-shadow:0 0 24px rgba(80,244,255,.22)}
      .gh-modal-card.danger .gh-modal-btn.confirm{background:linear-gradient(135deg,#ff5d7a,#ffb65d)}
      .gh-toast{position:fixed;right:18px;bottom:18px;z-index:99998;padding:13px 15px;border-radius:16px;background:linear-gradient(135deg,rgba(80,244,255,.95),rgba(199,125,255,.95));color:#05101d;font-weight:1000;box-shadow:0 18px 50px rgba(0,0,0,.34);font-family:inherit;max-width:min(340px,calc(100vw - 36px));transition:all .35s ease}
    `;
    document.head.appendChild(style);
  }
  function modal(opts) {
    ensureStyles();
    opts = opts || {};
    return new Promise(function (resolve) {
      const overlay = document.createElement("div");
      overlay.className = "gh-modal-overlay";
      const card = document.createElement("div");
      card.className = "gh-modal-card" + (opts.danger ? " danger" : "");
      card.setAttribute("role", "dialog");
      card.setAttribute("aria-modal", "true");
      const inputHtml = opts.input ? `<input class="gh-modal-input" id="ghModalInput" value="${String(opts.value || "").replace(/"/g, "&quot;")}" placeholder="${String(opts.placeholder || "").replace(/"/g, "&quot;")}">` : "";
      card.innerHTML = `<div class="gh-modal-icon">${opts.icon || "💬"}</div><h2 class="gh-modal-title">${opts.title || "Message"}</h2><p class="gh-modal-message">${opts.message || ""}</p>${inputHtml}<div class="gh-modal-actions"><button class="gh-modal-btn cancel" type="button">${opts.cancelText || "Cancel"}</button><button class="gh-modal-btn confirm" type="button">${opts.confirmText || "OK"}</button></div>`;
      overlay.appendChild(card);
      document.body.appendChild(overlay);
      const cancel = card.querySelector(".cancel");
      const confirm = card.querySelector(".confirm");
      const input = card.querySelector("#ghModalInput");
      cancel.style.display = opts.hideCancel ? "none" : "inline-flex";
      function done(value) { overlay.remove(); resolve(value); }
      cancel.onclick = function () { done(opts.input ? null : false); };
      confirm.onclick = function () { done(opts.input ? (input ? input.value : "") : true); };
      overlay.addEventListener("click", function (event) { if (event.target === overlay) done(opts.input ? null : false); });
      window.addEventListener("keydown", function onKey(e) {
        if (!document.body.contains(overlay)) return window.removeEventListener("keydown", onKey);
        if (e.key === "Escape") { window.removeEventListener("keydown", onKey); done(opts.input ? null : false); }
        if (e.key === "Enter" && input) { window.removeEventListener("keydown", onKey); done(input.value); }
      });
      if (input) setTimeout(function () { input.focus(); input.select(); }, 40);
    });
  }
  function toast(text) {
    ensureStyles();
    const t = document.createElement("div");
    t.className = "gh-toast";
    t.textContent = text;
    document.body.appendChild(t);
    setTimeout(function () { t.style.opacity = "0"; t.style.transform = "translateY(8px)"; }, 2400);
    setTimeout(function () { t.remove(); }, 2850);
  }
  window.GameHubModal = {
    alert: function (title, message) { return modal({ title: title || "Message", message: message || "", icon: "💬", hideCancel: true }); },
    confirm: function (title, message, opts) { opts = opts || {}; return modal({ title: title || "Confirm", message: message || "", icon: opts.icon || "⚠️", danger: !!opts.danger, confirmText: opts.confirmText || "Confirm", cancelText: opts.cancelText || "Cancel" }); },
    prompt: function (title, message, opts) { opts = opts || {}; return modal({ title: title || "Input", message: message || "", icon: opts.icon || "⌨️", input: true, value: opts.value || "", placeholder: opts.placeholder || "", confirmText: opts.confirmText || "OK", cancelText: opts.cancelText || "Cancel" }); },
    toast: toast
  };
  const nativeAlert = window.alert;
  window.alert = function (message) { try { window.GameHubModal.alert("Message", String(message || "")); } catch (err) { nativeAlert(message); } };
})();
</script>

      { word: "PROTOCOL", clue: "Rules that systems follow to communicate" },
      { word: "ENCRYPTION", clue: "The process of protecting readable data" }
    ];

    const totalLevelsCount = 40;
    const maxWordsEachDirection = 5;
    let levelProgressState = Array(totalLevelsCount).fill(false);
    levelProgressState[0] = true;

    const savedProgression = localStorage.getItem("crossword_progression");
    if (savedProgression) {
      try {
        const parsed = JSON.parse(savedProgression);
        levelProgressState = Array(totalLevelsCount).fill(false).map((_, i) => Boolean(parsed[i]));
        levelProgressState[0] = true;
      } catch (err) {
        localStorage.removeItem("crossword_progression");
      }
    }

    function getLatestUnlockedLevelIndex() {
      let latest = 0;
      for (let i = 0; i < levelProgressState.length; i++) {
        if (levelProgressState[i]) latest = i;
      }
      return latest;
    }

    let currentLevelIndex = getLatestUnlockedLevelIndex();
    let activeLevelData = null;
    let inputRefs = [];

    const gridEl = document.getElementById('grid');
    const statusEl = document.getElementById('status');
    const acrossCluesEl = document.getElementById('across-clues');
    const downCluesEl = document.getElementById('down-clues');
    const levelControlsEl = document.getElementById('level-controls');
    const revealBtn = document.getElementById('reveal-btn');
    const hintBtn = document.getElementById('hint-btn');

    const revealCooldownMs = 7 * 24 * 60 * 60 * 1000;
    const revealStorageKey = "crossword_reveal_used_at";
    const hintStorageKey = "crossword_hint_usage_v1";
    const maxHintsPerLevel = 3;

    // Extract verified Auth credentials and live profile parameters 
    const username = window.GameHubAuth ? window.GameHubAuth.username : "Player";
    document.getElementById("accountName").textContent = username;

    if (window.GameHubProfile && typeof window.GameHubProfile.readProfile === "function") {
      const liveProfile = window.GameHubProfile.readProfile();
      if (liveProfile && (liveProfile.mainLevel || liveProfile.level)) {
        document.getElementById("accountLevel").textContent = "LV " + (liveProfile.mainLevel || liveProfile.level);
      }
    }

    function cleanAnswer(value) {
      return value.replace(/[^a-zA-Z]/g, "").toUpperCase();
    }

    function renderLevelSelectorGrid() {
      const latestUnlocked = getLatestUnlockedLevelIndex();
      const canGoBack = currentLevelIndex > 0;
      const canGoNext = currentLevelIndex < totalLevelsCount - 1 && levelProgressState[currentLevelIndex + 1];
      const nextLabel = currentLevelIndex < totalLevelsCount - 1
        ? (canGoNext ? "Next" : "Locked")
        : "Max";

      levelControlsEl.innerHTML = `
        <button class="selector-btn" id="prev-level-btn" ${canGoBack ? "" : "disabled"}>← Previous</button>
        <div class="level-readout">
          Level ${currentLevelIndex + 1} / ${totalLevelsCount}
          <small>Latest unlocked: Level ${latestUnlocked + 1}</small>
        </div>
        <button class="selector-btn" id="next-level-btn" ${canGoNext ? "" : "disabled"}>${nextLabel} →</button>
      `;

      document.getElementById('prev-level-btn').onclick = () => {
        if (canGoBack) switchLevel(currentLevelIndex - 1);
      };
      document.getElementById('next-level-btn').onclick = () => {
        if (canGoNext) switchLevel(currentLevelIndex + 1);
      };
    }

    function getLengthHint(answer) {
      return answer.length;
    }

    function seededRandom(seed) {
      let value = seed % 2147483647;
      if (value <= 0) value += 2147483646;
      return function () {
        value = value * 16807 % 2147483647;
        return (value - 1) / 2147483646;
      };
    }

    function getLevelWordPool(index) {
      const rng = seededRandom(index + 73);
      const words = crosswordWords.map(item => ({
        answer: cleanAnswer(item.word),
        clue: item.clue
      })).filter(item => item.answer.length >= 3 && item.answer.length <= 12);

      for (let i = words.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [words[i], words[j]] = [words[j], words[i]];
      }

      const start = (index * 3) % words.length;
      return words.slice(start).concat(words.slice(0, start));
    }

    function getLayoutStyle(index) {
      const styles = [
        { name: "Classic Cross", firstDirection: "across", firstRow: 6, firstCol: 2 },
        { name: "Top Ladder", firstDirection: "across", firstRow: 3, firstCol: 1 },
        { name: "Left Spine", firstDirection: "down", firstRow: 1, firstCol: 4 },
        { name: "Center Stack", firstDirection: "down", firstRow: 2, firstCol: 7 },
        { name: "Wide Bridge", firstDirection: "across", firstRow: 8, firstCol: 0 }
      ];
      return styles[index % styles.length];
    }

    function createEmptyMatrix(size) {
      return Array(size).fill(null).map(() => Array(size).fill('.'));
    }

    function cellValue(matrix, row, col) {
      if (row < 0 || row >= matrix.length || col < 0 || col >= matrix.length) return '.';
      return matrix[row][col];
    }

    function canPlaceWord(matrix, answer, row, col, direction, requireCross) {
      const dr = direction === "down" ? 1 : 0;
      const dc = direction === "across" ? 1 : 0;
      let crosses = 0;

      const before = cellValue(matrix, row - dr, col - dc);
      const after = cellValue(matrix, row + dr * answer.length, col + dc * answer.length);
      if (before !== '.' || after !== '.') return false;

      for (let i = 0; i < answer.length; i++) {
        const r = row + dr * i;
        const c = col + dc * i;
        if (r < 0 || r >= matrix.length || c < 0 || c >= matrix.length) return false;

        const current = matrix[r][c];
        if (current !== '.' && current.v !== answer[i]) return false;
        if (current !== '.') {
          crosses++;
          continue;
        }

        if (direction === "across") {
          if (cellValue(matrix, r - 1, c) !== '.' || cellValue(matrix, r + 1, c) !== '.') return false;
        } else {
          if (cellValue(matrix, r, c - 1) !== '.' || cellValue(matrix, r, c + 1) !== '.') return false;
        }
      }

      return !requireCross || crosses > 0;
    }

    function placeWord(matrix, item, row, col, direction) {
      const dr = direction === "down" ? 1 : 0;
      const dc = direction === "across" ? 1 : 0;
      for (let i = 0; i < item.answer.length; i++) {
        const r = row + dr * i;
        const c = col + dc * i;
        matrix[r][c] = { v: item.answer[i] };
      }
      return { ...item, row, col, direction };
    }

    function tryAddCrossingWord(matrix, placedWords, item, preferredDirection) {
      const directions = preferredDirection ? [preferredDirection] : ["across", "down"];

      for (const direction of directions) {
        const opposite = direction === "across" ? "down" : "across";
        const crossableWords = placedWords.filter(word => word.direction === opposite);

        for (const base of crossableWords) {
          for (let i = 0; i < item.answer.length; i++) {
            for (let j = 0; j < base.answer.length; j++) {
              if (item.answer[i] !== base.answer[j]) continue;

              const crossRow = base.row + (base.direction === "down" ? j : 0);
              const crossCol = base.col + (base.direction === "across" ? j : 0);
              const row = crossRow - (direction === "down" ? i : 0);
              const col = crossCol - (direction === "across" ? i : 0);

              if (canPlaceWord(matrix, item.answer, row, col, direction, true)) {
                return placeWord(matrix, item, row, col, direction);
              }
            }
          }
        }
      }

      return null;
    }

    function trimMatrix(matrix, placedWords) {
      let minRow = matrix.length;
      let minCol = matrix.length;
      let maxRow = 0;
      let maxCol = 0;

      for (let r = 0; r < matrix.length; r++) {
        for (let c = 0; c < matrix.length; c++) {
          if (matrix[r][c] !== '.') {
            minRow = Math.min(minRow, r);
            minCol = Math.min(minCol, c);
            maxRow = Math.max(maxRow, r);
            maxCol = Math.max(maxCol, c);
          }
        }
      }

      const padding = 1;
      minRow = Math.max(0, minRow - padding);
      minCol = Math.max(0, minCol - padding);
      maxRow = Math.min(matrix.length - 1, maxRow + padding);
      maxCol = Math.min(matrix.length - 1, maxCol + padding);

      const rows = maxRow - minRow + 1;
      const cols = maxCol - minCol + 1;
      const size = Math.max(rows, cols, 6);
      const trimmed = createEmptyMatrix(size);

      for (let r = minRow; r <= maxRow; r++) {
        for (let c = minCol; c <= maxCol; c++) {
          if (matrix[r][c] !== '.') {
            trimmed[r - minRow][c - minCol] = { ...matrix[r][c] };
          }
        }
      }

      const adjustedWords = placedWords.map(word => ({
        ...word,
        row: word.row - minRow,
        col: word.col - minCol
      }));

      return { matrix: trimmed, placedWords: adjustedWords, size };
    }

    function addClueNumbers(matrix, placedWords) {
      const startNumbers = new Map();
      let nextNumber = 1;
      const sortedWords = [...placedWords].sort((a, b) => a.row - b.row || a.col - b.col || a.direction.localeCompare(b.direction));

      for (const word of sortedWords) {
        const key = `${word.row},${word.col}`;
        if (!startNumbers.has(key)) {
          startNumbers.set(key, nextNumber++);
        }
        word.n = startNumbers.get(key);
        matrix[word.row][word.col].n = word.n;
      }

      return {
        across: sortedWords
          .filter(word => word.direction === "across")
          .sort((a, b) => a.n - b.n)
          .map(word => ({ n: word.n, text: `${word.clue} (${getLengthHint(word.answer)})` })),
        down: sortedWords
          .filter(word => word.direction === "down")
          .sort((a, b) => a.n - b.n)
          .map(word => ({ n: word.n, text: `${word.clue} (${getLengthHint(word.answer)})` }))
      };
    }

    function generateDatabaseLevel(index) {
      statusEl.className = "status-msg";
      statusEl.innerText = "";

      const style = getLayoutStyle(index);
      const matrixSize = 24;
      const matrix = createEmptyMatrix(matrixSize);
      const pool = getLevelWordPool(index);
      const targetPerDirection = Math.min(maxWordsEachDirection, index + 1);
      const placedWords = [];

      const firstWord = pool.find(item => item.answer.length <= 10) || pool[0];
      const firstStartCol = Math.min(style.firstCol, matrixSize - firstWord.answer.length - 1);
      const firstStartRow = Math.min(style.firstRow, matrixSize - firstWord.answer.length - 1);
      const row = style.firstDirection === "across" ? style.firstRow : firstStartRow;
      const col = style.firstDirection === "across" ? firstStartCol : style.firstCol;
      placedWords.push(placeWord(matrix, firstWord, row, col, style.firstDirection));

      function countDirection(direction) {
        return placedWords.filter(word => word.direction === direction).length;
      }

      function nextNeededDirection() {
        const acrossCount = countDirection("across");
        const downCount = countDirection("down");
        if (acrossCount >= targetPerDirection && downCount >= targetPerDirection) return null;
        if (acrossCount < targetPerDirection && downCount < targetPerDirection) {
          return acrossCount <= downCount ? "across" : "down";
        }
        return acrossCount < targetPerDirection ? "across" : "down";
      }

      let safetyPasses = 0;
      while (nextNeededDirection() && safetyPasses < 8) {
        safetyPasses++;
        let addedThisPass = false;

        for (const item of pool) {
          const desiredDirection = nextNeededDirection();
          if (!desiredDirection) break;
          if (placedWords.some(word => word.answer === item.answer)) continue;

          const placed = tryAddCrossingWord(matrix, placedWords, item, desiredDirection);
          if (placed) {
            placedWords.push(placed);
            addedThisPass = true;
          }
        }

        if (!addedThisPass) break;
      }

      const { matrix: trimmedMatrix, placedWords: adjustedWords, size } = trimMatrix(matrix, placedWords);
      const clues = addClueNumbers(trimmedMatrix, adjustedWords);

      activeLevelData = {
        size,
        grid: trimmedMatrix,
        clues,
        placedWords: adjustedWords,
        styleName: style.name
      };

      buildUI(activeLevelData);
    }

    function setGridSizing(size) {
      const layoutBox = document.querySelector('.grid-container').getBoundingClientRect();
      const reservedForStatusAndButtons = 92;
      const availableWidth = Math.max(280, layoutBox.width - 20);
      const availableHeight = Math.max(280, layoutBox.height - reservedForStatusAndButtons);
      const gap = 0;
      const padding = 0;
      const maxCellByWidth = (availableWidth - padding) / size;
      const maxCellByHeight = (availableHeight - padding) / size;
      // Crop-safe zoom: make cells a bit larger, but avoid CSS transforms that cut off edges.
      const baseCellSize = Math.min(maxCellByWidth, maxCellByHeight) * 1.06;
      const cellSize = Math.floor(Math.max(30, Math.min(54, baseCellSize)));

      gridEl.style.setProperty('--cell-size', `${cellSize}px`);
      gridEl.style.setProperty('--cell-gap', `${gap}px`);
      gridEl.style.gridTemplateColumns = `repeat(${size}, var(--cell-size))`;
      gridEl.style.gridTemplateRows = `repeat(${size}, var(--cell-size))`;
    }

    function buildUI(lvl) {
      gridEl.innerHTML = "";
      inputRefs = [];

      setGridSizing(lvl.size);

      for (let r = 0; r < lvl.size; r++) {
        inputRefs[r] = [];
        for (let c = 0; c < lvl.size; c++) {
          const slot = lvl.grid[r][c];
          const block = document.createElement('div');
          block.className = slot === '.' ? 'cell black' : 'cell';

          if (slot !== '.') {
            if (slot.n) {
              const label = document.createElement('span');
              label.className = 'cell-num';
              label.innerText = slot.n;
              block.appendChild(label);
            }
            const box = document.createElement('input');
            box.setAttribute('maxlength', '1');
            box.setAttribute('aria-label', `Row ${r + 1}, column ${c + 1}`);
            box.addEventListener('keyup', (e) => navigate(e, r, c, lvl.size));
            box.addEventListener('focus', () => highlightCrosswordWord(r, c));
            block.appendChild(box);
            inputRefs[r][c] = box;
          }
          gridEl.appendChild(block);
        }
      }

      acrossCluesEl.innerHTML = lvl.clues.across.map(c =>
        `<div class="clue-item"><span>${c.n}</span><span class="clue-text">${c.text}</span></div>`
      ).join('');

      downCluesEl.innerHTML = lvl.clues.down.map(c =>
        `<div class="clue-item"><span>${c.n}</span><span class="clue-text">${c.text}</span></div>`
      ).join('');

      updateHintButton();
      updateRevealButton();
    }


    function clearCrosswordHighlights() {
      Array.from(gridEl.children).forEach(cell => {
        cell.classList.remove('active-cell', 'word-highlight');
      });
    }

    function markCrosswordCell(r, c, className) {
      if (!activeLevelData) return;
      if (r < 0 || c < 0 || r >= activeLevelData.size || c >= activeLevelData.size) return;
      const cell = gridEl.children[r * activeLevelData.size + c];
      if (cell && !cell.classList.contains('black')) cell.classList.add(className);
    }

    function collectWordCells(r, c, dr, dc) {
      if (!activeLevelData || activeLevelData.grid[r][c] === '.') return [];
      let startR = r;
      let startC = c;
      while (
        startR - dr >= 0 &&
        startC - dc >= 0 &&
        startR - dr < activeLevelData.size &&
        startC - dc < activeLevelData.size &&
        activeLevelData.grid[startR - dr][startC - dc] !== '.'
      ) {
        startR -= dr;
        startC -= dc;
      }

      const cells = [];
      let row = startR;
      let col = startC;
      while (
        row >= 0 &&
        col >= 0 &&
        row < activeLevelData.size &&
        col < activeLevelData.size &&
        activeLevelData.grid[row][col] !== '.'
      ) {
        cells.push({ r: row, c: col });
        row += dr;
        col += dc;
      }
      return cells;
    }

    function highlightCrosswordWord(r, c) {
      clearCrosswordHighlights();

      const across = collectWordCells(r, c, 0, 1);
      const down = collectWordCells(r, c, 1, 0);
      const wordCells = across.length >= down.length ? across : down;

      wordCells.forEach(pos => markCrosswordCell(pos.r, pos.c, 'word-highlight'));
      markCrosswordCell(r, c, 'active-cell');
    }

    function navigate(e, r, c, size) {
      if ((e.key >= 'a' && e.key <= 'z') || (e.key >= 'A' && e.key <= 'Z')) {
        e.target.value = e.target.value.toUpperCase();
        focusNext(r, c + 1, size);
      } else if (e.key === 'Backspace') {
        focusNext(r, c - 1, size);
      } else if (e.key === 'ArrowRight') focusNext(r, c + 1, size);
      else if (e.key === 'ArrowLeft') focusNext(r, c - 1, size);
      else if (e.key === 'ArrowUp') focusNext(r - 1, c, size);
      else if (e.key === 'ArrowDown') focusNext(r + 1, c, size);
    }

    function focusNext(r, c, size) {
      if (r >= 0 && r < size && c >= 0 && c < size && inputRefs[r][c]) {
        inputRefs[r][c].focus();
      }
    }

    function getHintUsageMap() {
      try {
        return JSON.parse(localStorage.getItem(hintStorageKey)) || {};
      } catch (err) {
        localStorage.removeItem(hintStorageKey);
        return {};
      }
    }

    function getHintCountForCurrentLevel() {
      const usage = getHintUsageMap();
      return Number(usage[currentLevelIndex] || 0);
    }

    function setHintCountForCurrentLevel(count) {
      const usage = getHintUsageMap();
      usage[currentLevelIndex] = count;
      localStorage.setItem(hintStorageKey, JSON.stringify(usage));
    }

    function updateHintButton() {
      const used = getHintCountForCurrentLevel();
      const remaining = Math.max(0, maxHintsPerLevel - used);
      hintBtn.innerText = `Hint ${remaining}/${maxHintsPerLevel}`;
      hintBtn.disabled = remaining <= 0;
      hintBtn.title = remaining > 0 ? "Reveal one letter in this level" : "No hints left for this level";
    }

    function getRevealUsedAt() {
      return Number(localStorage.getItem(revealStorageKey) || 0);
    }

    function getRevealRemainingMs() {
      const usedAt = getRevealUsedAt();
      if (!usedAt) return 0;
      return Math.max(0, revealCooldownMs - (Date.now() - usedAt));
    }

    function formatCooldown(ms) {
      const totalHours = Math.ceil(ms / (60 * 60 * 1000));
      const days = Math.floor(totalHours / 24);
      const hours = totalHours % 24;
      if (days > 0) return `${days}d ${hours}h`;
      return `${hours}h`;
    }

    function updateRevealButton() {
      const remaining = getRevealRemainingMs();
      if (remaining > 0) {
        revealBtn.disabled = true;
        revealBtn.innerText = `Reveal locked (${formatCooldown(remaining)})`;
        revealBtn.title = "Reveal answers can be used once per week.";
      } else {
        revealBtn.disabled = false;
        revealBtn.innerText = "Reveal Answers";
        revealBtn.title = "Use your weekly reveal.";
      }
    }

    function findNextHintCell() {
      if (!activeLevelData) return null;
      const cells = [];
      for (let r = 0; r < activeLevelData.size; r++) {
        for (let c = 0; c < activeLevelData.size; c++) {
          const slot = activeLevelData.grid[r][c];
          if (slot !== '.') {
            const current = inputRefs[r][c].value.toUpperCase();
            if (current !== slot.v) cells.push({ r, c, value: slot.v });
          }
        }
      }
      return cells[0] || null;
    }

    function useHint() {
      if (!activeLevelData) return;
      const used = getHintCountForCurrentLevel();
      if (used >= maxHintsPerLevel) {
        updateHintButton();
        statusEl.className = "status-msg fail";
        statusEl.innerText = "No hints left for this level.";
        return;
      }

      const hintCell = findNextHintCell();
      if (!hintCell) {
        statusEl.className = "status-msg success";
        statusEl.innerText = "All letters are already filled correctly.";
        return;
      }

      inputRefs[hintCell.r][hintCell.c].value = hintCell.value;
      inputRefs[hintCell.r][hintCell.c].focus();
      setHintCountForCurrentLevel(used + 1);
      updateHintButton();
      statusEl.className = "status-msg success";
      statusEl.innerText = "Hint used: one letter revealed.";
    }

    function checkAnswers() {
      if (!activeLevelData) return;
      let isCorrect = true;

      for (let r = 0; r < activeLevelData.size; r++) {
        for (let c = 0; c < activeLevelData.size; c++) {
          if (activeLevelData.grid[r][c] !== '.') {
            const entry = inputRefs[r][c].value.toUpperCase();
            if (entry !== activeLevelData.grid[r][c].v) {
              isCorrect = false;
            }
          }
        }
      }

      if (isCorrect) {
        statusEl.className = "status-msg success";
        statusEl.innerText = "Grid verification complete.";
        if (window.GameHubProfile) window.GameHubProfile.recordSuccess("Crossword", { level: currentLevelIndex + 1, xp: 60, successId: "crossword-level-" + (currentLevelIndex + 1), title: "Completed Crossword Level " + (currentLevelIndex + 1) });

        if (currentLevelIndex + 1 < totalLevelsCount) {
          if (!levelProgressState[currentLevelIndex + 1]) {
            levelProgressState[currentLevelIndex + 1] = true;
            localStorage.setItem("crossword_progression", JSON.stringify(levelProgressState));
            renderLevelSelectorGrid();
          }
        }
      } else {
        statusEl.className = "status-msg fail";
        statusEl.innerText = "Mismatched entries detected within alignment registers.";
      }
    }

    function revealGrid() {
      if (!activeLevelData) return;
      const remaining = getRevealRemainingMs();
      if (remaining > 0) {
        updateRevealButton();
        statusEl.className = "status-msg fail";
        statusEl.innerText = `Reveal is available again in ${formatCooldown(remaining)}.`;
        return;
      }

      for (let r = 0; r < activeLevelData.size; r++) {
        for (let c = 0; c < activeLevelData.size; c++) {
          if (activeLevelData.grid[r][c] !== '.') {
            inputRefs[r][c].value = activeLevelData.grid[r][c].v;
          }
        }
      }

      localStorage.setItem(revealStorageKey, String(Date.now()));
      updateRevealButton();
      statusEl.className = "status-msg success";
      statusEl.innerText = "Weekly reveal used. It resets after 7 days.";
    }

    function switchLevel(index) {
      if (index < 0 || index >= totalLevelsCount) return;
      if (!levelProgressState[index]) {
        statusEl.className = "status-msg fail";
        statusEl.innerText = "Complete the current latest level before moving forward.";
        renderLevelSelectorGrid();
        return;
      }
      currentLevelIndex = index;
      renderLevelSelectorGrid();
      generateDatabaseLevel(index);
    }

    window.addEventListener('resize', () => {
      if (activeLevelData) setGridSizing(activeLevelData.size);
    });

    renderLevelSelectorGrid();
    generateDatabaseLevel(currentLevelIndex);
    setInterval(updateRevealButton, 60 * 1000);
  </script>
  <script>document.querySelectorAll(".accountName").forEach(el => el.textContent = window.GameHubAuth ? window.GameHubAuth.username : "Player"); window.addEventListener("beforeunload", () => { if (window.GameHubAuth) window.GameHubAuth.saveNow(); });

    // ========================================================
  // REAL-TIME CHAT & USER CONNECTION SYSTEM
  // ========================================================
  (function() {
    const DB_URL = "https://gamehubss-default-rtdb.firebaseio.com/";
    const myUsername = username;
    
    function cleanKey(name) { 
      return String(name || "").trim().toLowerCase().replace(/[^a-z0-9_]/g, "_"); 
    }
    const myKey = cleanKey(myUsername);

    let activeChatTarget = null;
    let syncIntervalId = null;

    // Grab Chat Element Handles
    const dock = document.getElementById('globalChatDock');
    const header = document.getElementById('chatHeaderClickable');
    const toggleIcon = document.getElementById('chatToggleIcon');
    const contactsView = document.getElementById('chatContactsView');
    const messagingView = document.getElementById('chatMessagingView');
    const contactInput = document.getElementById('targetFriendInput');
    const addBtn = document.getElementById('addFriendActionBtn');
    const contactsBox = document.getElementById('contactsBox');
    const messagesBox = document.getElementById('messagesBox');
    const messageInput = document.getElementById('rawMessageText');
    const sendMsgBtn = document.getElementById('sendMessageActionBtn');
    const backBtn = document.getElementById('leaveChatRoomBtn');

    // --- CUSTOM MODAL STYLED NOTIFICATIONS ---
    function showCustomAlert(title, message) {
      const modalOverlay = document.createElement('div');
      modalOverlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(5,8,20,0.85); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:99999;";
      
      const card = document.createElement('div');
      card.style = "background:var(--panel, #0f142d); border:1px solid rgba(93,242,255,0.2); border-radius:16px; padding:24px; width:90%; max-width:400px; box-shadow:0 20px 50px rgba(0,0,0,0.6); text-align:center; font-family:inherit; color:var(--text, #eef4ff);";
      
      card.innerHTML = `
        <h3 style="margin-top:0; color:var(--accent, #5df2ff); font-size:1.2rem; font-weight:800; letter-spacing:0.05em;">${title}</h3>
        <p style="margin:16px 0 24px; font-size:0.9rem; line-height:1.5; color:var(--muted, #95a3c7);">${message}</p>
        <button id="customAlertCloseBtn" class="chat-action-btn" style="padding:10px 24px; font-size:0.9rem; width:100%; border-radius:10px;">Acknowledge</button>
      `;
      
      modalOverlay.appendChild(card);
      document.body.appendChild(modalOverlay);
      
      document.getElementById('customAlertCloseBtn').addEventListener('click', () => {
        modalOverlay.remove();
      });
    }

    function showCustomConfirm(title, message, onConfirm) {
      const modalOverlay = document.createElement('div');
      modalOverlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(5,8,20,0.85); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:99999;";
      
      const card = document.createElement('div');
      card.style = "background:var(--panel, #0f142d); border:1px solid rgba(180,107,255,0.2); border-radius:16px; padding:24px; width:90%; max-width:400px; box-shadow:0 20px 50px rgba(0,0,0,0.6); font-family:inherit; color:var(--text, #eef4ff);";
      
      card.innerHTML = `
        <h3 style="margin-top:0; color:var(--accent-2, #b46bff); font-size:1.2rem; font-weight:800; text-align:center; letter-spacing:0.05em;">${title}</h3>
        <p style="margin:16px 0 24px; font-size:0.9rem; line-height:1.5; text-align:center; color:var(--muted, #95a3c7);">${message}</p>
        <div style="display:flex; gap:12px;">
          <button id="customConfirmCancelBtn" class="chat-action-btn" style="background:rgba(255,255,255,0.08); color:var(--text); padding:10px 16px; font-size:0.9rem; flex:1; border-radius:10px; border:1px solid rgba(255,255,255,0.1);">Decline</button>
          <button id="customConfirmAcceptBtn" class="chat-action-btn" style="padding:10px 16px; font-size:0.9rem; flex:1; border-radius:10px;">Accept</button>
        </div>
      `;
      
      modalOverlay.appendChild(card);
      document.body.appendChild(modalOverlay);
      
      document.getElementById('customConfirmCancelBtn').addEventListener('click', () => {
        modalOverlay.remove();
      });
      
      document.getElementById('customConfirmAcceptBtn').addEventListener('click', () => {
        modalOverlay.remove();
        onConfirm();
      });
    }

    // 1. Minimize / Maximize Dock Toggle Animation Logic
    if (header) {
      header.addEventListener('click', () => {
        const isMin = dock.classList.toggle('minimized');
        toggleIcon.textContent = isMin ? '▲' : '—';
        if (!isMin) {
          refreshSocialLoop();
          if (!syncIntervalId) syncIntervalId = setInterval(refreshSocialLoop, 3000);
        } else {
          if (syncIntervalId) { 
            clearInterval(syncIntervalId); 
            syncIntervalId = null; 
          }
        }
      });
    }

    // 2. Add Username Verification & Friend Request Generation
    if (addBtn) {
      addBtn.addEventListener('click', async () => {
        const targetName = contactInput.value.trim();
        const targetKey = cleanKey(targetName);

        if (!targetName || targetKey === myKey) {
          showCustomAlert("Invalid Target", "Please input a valid username different from your own.");
          return;
        }

        try {
          const checkRes = await fetch(`${DB_URL}/users/${targetKey}.json`);
          const targetProfile = await checkRes.json();

          if (!targetProfile) {
            showCustomAlert("User Not Found", `The username "${targetName}" does not exist in the platform data directory.`);
            return;
          }

          const sortedRoomKey = myKey < targetKey ? `${myKey}_vs_${targetKey}` : `${targetKey}_vs_${myKey}`;

          await fetch(`${DB_URL}/chats/${sortedRoomKey}/status.json`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
              requester: myUsername, 
              responder: targetProfile.username || targetName, 
              accepted: false 
            })
          });

          showCustomAlert("Success", `Connection invitation successfully dispatched to ${targetName}!`);
          contactInput.value = "";
          refreshSocialLoop();
        } catch (e) {
          console.error("Error setting up dynamic invitation request:", e);
        }
      });
    }

    // 3. Dynamic Synchronization of Contact Relationships Listing
    async function refreshSocialLoop() {
      try {
        const res = await fetch(`${DB_URL}/chats.json`);
        const allChats = await res.json() || {};
        if (!contactsBox) return;
        contactsBox.innerHTML = "";

        Object.keys(allChats).forEach(roomKey => {
          if (roomKey.includes(myKey)) {
            const room = allChats[roomKey];
            const status = room.status || {};
            const isRequester = cleanKey(status.requester) === myKey;
            const peerName = isRequester ? status.responder : status.requester;
            
            const item = document.createElement('div');
            item.className = 'contact-item';

            const info = document.createElement('div');
            info.className = 'contact-info';
            
            const nameSpan = document.createElement('span');
            nameSpan.className = 'contact-name';
            nameSpan.textContent = peerName;
            info.appendChild(nameSpan);

            const statusSpan = document.createElement('span');
            statusSpan.className = 'contact-status';

            if (status.accepted) {
              statusSpan.textContent = "🟢 Connected - Click to Chat";
              item.addEventListener('click', () => openDirectMessaging(roomKey, peerName));
            } else {
              if (isRequester) {
                statusSpan.textContent = "⏳ Sent - Pending Verification";
              } else {
                statusSpan.textContent = "📥 Request Received - Click to Accept";
                item.style.borderLeft = "3px solid var(--accent)";
                item.addEventListener('click', () => handleAcceptRequest(roomKey, peerName));
              }
            }
            info.appendChild(statusSpan);
            item.appendChild(info);
            contactsBox.appendChild(item);
          }
        });

        if (activeChatTarget) {
          renderLiveMessages(allChats[activeChatTarget.roomKey]?.messages || {});
        }
      } catch(err) {
        console.error("Error retrieving background updates:", err);
      }
    }

    // 4. Accept Mutual Agreement Handshake using Custom Styled Confirm Modals
    async function handleAcceptRequest(roomKey, peerName) {
      showCustomConfirm(
        "Accept Connection", 
        `Would you like to accept the chat invitation and open transmissions with ${peerName}?`, 
        async () => {
          await fetch(`${DB_URL}/chats/${roomKey}/status/accepted.json`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(true)
          });
          refreshSocialLoop();
        }
      );
    }

    // 5. Interface View Changes
    function openDirectMessaging(roomKey, peerName) {
      activeChatTarget = { roomKey, peerName };
      contactsView.classList.add('hidden');
      messagingView.classList.remove('hidden');
      refreshSocialLoop();
    }

    if (backBtn) {
      backBtn.addEventListener('click', () => {
        activeChatTarget = null;
        messagingView.classList.add('hidden');
        contactsView.classList.remove('hidden');
      });
    }

    // 6. Transmit Messages Payload Loop
    async function transmitChatMessage() {
      const text = messageInput.value.trim();
      if (!text || !activeChatTarget) return;

      const payload = {
        sender: myUsername,
        text: text,
        timestamp: new Date().toISOString()
      };

      messageInput.value = "";
      await fetch(`${DB_URL}/chats/${activeChatTarget.roomKey}/messages.json`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      refreshSocialLoop();
    }

    if (sendMsgBtn) sendMsgBtn.addEventListener('click', transmitChatMessage);
    if (messageInput) {
      messageInput.addEventListener('keydown', (e) => { 
        if (e.key === 'Enter') transmitChatMessage(); 
      });
    }

    // 7. Render Chat History Output Container
    function renderLiveMessages(messagesObj) {
      if (!messagesBox) return;
      messagesBox.innerHTML = "";
      
      Object.values(messagesObj).forEach(msg => {
        const bubble = document.createElement('div');
        bubble.className = `message-bubble ${cleanKey(msg.sender) === myKey ? 'outgoing' : 'incoming'}`;
        bubble.textContent = msg.text;
        messagesBox.appendChild(bubble);
      });
      
      messagesBox.scrollTop = messagesBox.scrollHeight;
    }
  })();

  </script>
