<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossy Road - Game Hub</title>
    <style>
        /* === UNIFIED ARCADE THEME (Adapted from homepage.html) === */
        :root {
            --bg: #050814;
            --panel: rgba(12, 18, 42, 0.72);
            --text: #f4f8ff;
            --muted: #aab7df;
            --accent: #50f4ff;
            --accent-2: #c77dff;
            --shadow: 0 24px 80px rgba(0,0,0,.48);
            --ring: 0 0 0 1px rgba(80,244,255,.22), 0 0 36px rgba(80,244,255,.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 8% 8%, rgba(80,244,255,.28), transparent 24rem),
                radial-gradient(circle at 92% 18%, rgba(199,125,255,.25), transparent 26rem),
                linear-gradient(140deg, #030611 0%, #090e25 48%, #180a26 100%);
            min-height: 100vh;
        }

        /* Ambient scanlines grid background */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 34px 34px;
            mask-image: linear-gradient(to bottom, black, transparent 88%);
            z-index: 0;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* === HEADER STYLING === */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            padding: 12px 24px;
            margin: 16px 20px 0;
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.025));
            box-shadow: 0 18px 50px rgba(0,0,0,.25);
            backdrop-filter: blur(16px) saturate(130%);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 900;
            letter-spacing: -0.04em;
            font-size: 1.2rem;
            text-shadow: 0 0 20px rgba(80,244,255,.14);
        }

        .logo {
            width: 32px;
            height: 32px;
            border-radius: 12px;
            background:
                linear-gradient(135deg, rgba(255,255,255,.28), transparent 40%),
                linear-gradient(135deg, var(--accent), var(--accent-2));
            box-shadow: 0 0 28px rgba(80,244,255,.34), inset 0 0 18px rgba(255,255,255,.18);
        }

        nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        nav a, .home-link {
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            padding: 8px 16px;
            border-radius: 999px;
            color: var(--muted);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            background: rgba(255,255,255,.045);
            border: 1px solid rgba(255,255,255,.07);
            transition: all .18s ease;
        }

        nav a:hover, .home-link:hover {
            color: var(--text);
            background: rgba(80,244,255,.12);
            border-color: rgba(80,244,255,.32);
            transform: translateY(-1px);
        }

        .account-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 34px;
            padding: 8px 14px;
            border-radius: 999px;
            color: var(--text);
            background: rgba(80,244,255,.10);
            border: 1px solid rgba(80,244,255,.24);
            font-weight: 900;
            font-size: 0.9rem;
        }
        
        .level-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent-2), #ff5d7a);
            color: #ffffff;
            font-size: 0.72rem;
            font-weight: 900;
            padding: 2px 7px;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(199,125,255,0.4);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* === CANVAS GAME SHELL === */
        #game-wrapper {
            flex: 1;
            position: relative;
            margin: 20px;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,.13);
            box-shadow: var(--shadow), var(--ring);
            background: rgba(7, 12, 31, 0.4);
        }

        #game-canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* === INTERFACE OVERLAYS === */
        #game-ui {
            position: absolute;
            top: 25px;
            left: 25px;
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 24px;
            border-radius: 16px;
            backdrop-filter: blur(8px);
            pointer-events: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .score-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin: 0 0 2px 0;
        }

        .score-val {
            font-size: 2rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        #instructions {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(7, 12, 31, 0.8);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            backdrop-filter: blur(6px);
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #instructions span {
            color: var(--accent);
            font-weight: bold;
        }

        /* === GAME OVER PANEL === */
        #gameover-screen {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(3, 6, 19, 0.85);
            backdrop-filter: blur(12px);
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .go-card {
            text-align: center;
            padding: 40px 60px;
            border-radius: 24px;
            background: var(--panel);
            border: 1px solid rgba(255,255,255,.13);
            box-shadow: var(--shadow), var(--ring);
        }

        .go-card h2 {
            font-size: 3rem;
            font-weight: 900;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #ff5d7a, #c77dff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.04em;
        }

        .go-card p {
            color: var(--muted);
            margin: 0 0 25px 0;
            font-size: 1.1rem;
        }

        button.action-btn {
            border: 1px solid rgba(255,255,255,.16) !important;
            background: linear-gradient(135deg, var(--accent), #9ffcff) !important;
            color: #05101d !important;
            font-weight: 900 !important;
            box-shadow: 0 0 24px rgba(80,244,255,.22) !important;
            padding: 14px 32px;
            font-size: 1rem;
            border-radius: 999px;
            cursor: pointer;
            transition: transform .18s ease, filter .18s ease;
        }

        button.action-btn:hover {
            transform: translateY(-2px) scale(1.02);
            filter: brightness(1.06);
        }



        .hud-stack {
            position: absolute;
            top: 25px;
            left: 25px;
            display: grid;
            gap: 10px;
            pointer-events: none;
        }

        #game-ui {
            position: relative;
            top: auto;
            left: auto;
        }

        #mini-stats {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: rgba(255,255,255,.075);
            border: 1px solid rgba(255,255,255,.11);
            color: var(--text);
            border-radius: 999px;
            padding: 7px 11px;
            font-size: .74rem;
            font-weight: 900;
            backdrop-filter: blur(8px);
        }

        #danger-banner {
            position: absolute;
            top: 25px;
            right: 25px;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(255, 93, 122, .16);
            border: 1px solid rgba(255, 93, 122, .34);
            color: #ffdce4;
            font-weight: 900;
            font-size: .82rem;
            letter-spacing: .06em;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            opacity: .95;
            pointer-events: none;
        }

        #game-wrapper::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at 50% 42%, transparent 35%, rgba(3,6,19,.24) 100%);
            mix-blend-mode: multiply;
        }



        .rank-display {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            vertical-align: middle;
        }

        .rank-emblem {
            width: 22px;
            height: 22px;
            display: inline-grid;
            place-items: center;
            border-radius: 50%;
            font-size: 0.82rem;
            line-height: 1;
            border: 1px solid rgba(255,255,255,.22);
            box-shadow: 0 0 16px rgba(255,255,255,.10), inset 0 0 10px rgba(255,255,255,.12);
        }

        .rank-rookie { background: linear-gradient(135deg, #64748b, #94a3b8); }
        .rank-bronze { background: linear-gradient(135deg, #8b4a20, #e49a52); }
        .rank-silver { background: linear-gradient(135deg, #d7dde8, #8e9aad); color: #0f172a; }
        .rank-gold { background: linear-gradient(135deg, #ffcc33, #ff8c42); color: #281306; }
        .rank-platinum { background: linear-gradient(135deg, #dffbff, #87f0ff, #c77dff); color: #07101f; }
        .rank-mythical { background: linear-gradient(135deg, #ff5d7a, #c77dff, #50f4ff); }

        #weather-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity .35s ease;
        }

        #weather-overlay.rainy {
            opacity: .75;
            background-image: linear-gradient(115deg, rgba(160,220,255,.0) 0%, rgba(160,220,255,.0) 42%, rgba(160,220,255,.36) 43%, rgba(160,220,255,.0) 45%);
            background-size: 18px 42px;
            animation: rainSheet .42s linear infinite;
        }

        #weather-overlay.night {
            opacity: .42;
            background: radial-gradient(circle at 50% 35%, transparent 28%, rgba(0,0,0,.55) 100%);
        }

        #weather-overlay.snow {
            opacity: .72;
            background-image:
                radial-gradient(circle, rgba(255,255,255,.86) 0 1.4px, transparent 1.8px),
                radial-gradient(circle, rgba(255,255,255,.58) 0 1px, transparent 1.5px);
            background-size: 32px 32px, 46px 46px;
            animation: snowSheet 6s linear infinite;
        }

        @keyframes snowSheet {
            from { background-position: 0 0, 0 0; }
            to { background-position: 32px 96px, -46px 138px; }
        }

        @keyframes rainSheet {
            from { background-position: 0 0; }
            to { background-position: -18px 42px; }
        }

        .blocked-hop {
            animation: blockedPulse .22s ease;
        }

        @keyframes blockedPulse {
            0% { filter: none; }
            50% { filter: drop-shadow(0 0 12px rgba(255,93,122,.85)); }
            100% { filter: none; }
        }


        @media (max-width: 640px) {
            header { margin: 10px 10px 0; padding: 10px 16px; }
            #game-wrapper { margin: 10px; }
            .go-card { padding: 30px 20px; width: 90%; }
        }
    </style>
    <script>
        // Game Hub auth/profile adapter copied from the homepage pattern.
        // It lets Crossy Road see the same current profile level stored as gamehub_profile_v1.
        (function () {
            const DB_URL = "https://gamelibrary-882b6-default-rtdb.asia-southeast1.firebasedatabase.app";
            const SESSION_KEY = "gamehub_current_user";
            const LOCAL_USER_KEY = "__gamehub_local_user__";
            const GAMEHUB_KEYS = ["gamehub_profile_v1", "crossyroad_maxDistance", "crossyroad_currentLevel", "crossyroad_lastLevel"];

            function safeUsernameKey(username) {
                return String(username || "").trim().toLowerCase().replace(/[^a-z0-9_]/g, "_");
            }
            function getCurrentUser() {
                try { return JSON.parse(sessionStorage.getItem(SESSION_KEY) || "null"); }
                catch (err) { return null; }
            }
            function firebaseUrl(parts) {
                return DB_URL.replace(/\/$/, "") + "/" + parts.map(encodeURIComponent).join("/") + ".json";
            }

            const currentUser = getCurrentUser() || { username: localStorage.getItem(LOCAL_USER_KEY) || "Player" };
            const userKey = safeUsernameKey(currentUser.username || "Player");

            if (!window.GameHubAuth) {
                const originalSetItem = localStorage.setItem.bind(localStorage);
                const originalRemoveItem = localStorage.removeItem.bind(localStorage);

                function cloudSet(key, value) {
                    if (!currentUser || !currentUser.username || key === LOCAL_USER_KEY) return;
                    fetch(firebaseUrl(["users", userKey, "gameData", key]), {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(String(value))
                    }).catch(function (err) { console.warn("Firebase save failed:", err); });
                    fetch(firebaseUrl(["users", userKey, "lastActiveAt"]), {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(new Date().toISOString())
                    }).catch(function () {});
                }
                function cloudRemove(key) {
                    if (!currentUser || !currentUser.username || key === LOCAL_USER_KEY) return;
                    fetch(firebaseUrl(["users", userKey, "gameData", key]), { method: "DELETE" })
                        .catch(function (err) { console.warn("Firebase remove failed:", err); });
                }

                localStorage.setItem = function (key, value) {
                    originalSetItem(key, value);
                    cloudSet(key, value);
                };
                localStorage.removeItem = function (key) {
                    originalRemoveItem(key);
                    cloudRemove(key);
                };

                window.GameHubAuth = {
                    dbUrl: DB_URL,
                    user: currentUser,
                    username: currentUser.username || "Player",
                    safeUsernameKey: safeUsernameKey,
                    firebaseUrl: firebaseUrl,
                    logout: function () {
                        sessionStorage.removeItem(SESSION_KEY);
                        window.location.href = "index.html";
                    },
                    saveNow: function () {
                        GAMEHUB_KEYS.forEach(function (key) {
                            const value = localStorage.getItem(key);
                            if (value !== null) cloudSet(key, value);
                        });
                    }
                };
            }
        })();
    </script>

    <script>
        (function () {
            const PROFILE_KEY = "gamehub_profile_v1";
            const MAX_RECENT = 12;

            if (window.GameHubProfile && typeof window.GameHubProfile.readProfile === "function") return;

            function nowIso() { return new Date().toISOString(); }
            function getUsername() {
                return (window.GameHubAuth && window.GameHubAuth.username) || "Player";
            }
            function blankGame() {
                return { successes: 0, bestScore: 0, bestLevel: 0, lastPlayedAt: null };
            }
            function defaultProfile() {
                const username = getUsername();
                return {
                    username,
                    displayName: username,
                    avatar: "🎮",
                    level: 1,
                    xp: 0,
                    successfulPlays: 0,
                    createdAt: nowIso(),
                    updatedAt: nowIso(),
                    games: {},
                    recentActivity: [],
                    completedSuccessIds: {}
                };
            }
            function readProfile() {
                let profile = null;
                try { profile = JSON.parse(localStorage.getItem(PROFILE_KEY) || "null"); }
                catch (err) { profile = null; }
                const base = defaultProfile();
                profile = profile && typeof profile === "object" ? profile : base;
                profile.username = getUsername();
                profile.displayName = profile.displayName || profile.username;
                profile.avatar = profile.avatar || "🎮";
                profile.level = Math.max(1, Number(profile.level || 1));
                profile.xp = Math.max(0, Number(profile.xp || 0));
                profile.successfulPlays = Math.max(0, Number(profile.successfulPlays || 0));
                profile.games = profile.games && typeof profile.games === "object" ? profile.games : {};
                profile.recentActivity = Array.isArray(profile.recentActivity) ? profile.recentActivity : [];
                profile.completedSuccessIds = profile.completedSuccessIds && typeof profile.completedSuccessIds === "object" ? profile.completedSuccessIds : {};
                return profile;
            }
            function saveProfile(profile) {
                profile.updatedAt = nowIso();
                localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
                return profile;
            }
            function showToast(text) {
                if (!document.body) return;
                const toast = document.createElement("div");
                toast.textContent = text;
                toast.style.cssText = "position:fixed;right:18px;bottom:18px;z-index:9999;padding:13px 15px;border-radius:16px;background:linear-gradient(135deg,rgba(80,244,255,.95),rgba(199,125,255,.95));color:#05101d;font-weight:1000;box-shadow:0 18px 50px rgba(0,0,0,.34);font-family:inherit;max-width:min(340px,calc(100vw - 36px));";
                document.body.appendChild(toast);
                setTimeout(function () { toast.style.opacity = "0"; toast.style.transform = "translateY(8px)"; toast.style.transition = "all .35s ease"; }, 2400);
                setTimeout(function () { toast.remove(); }, 2850);
            }
            function recordSuccess(gameName, details) {
                details = details || {};
                const profile = readProfile();
                const successId = details.successId ? String(details.successId) : "";
                if (successId && profile.completedSuccessIds[successId]) return profile;
                if (successId) profile.completedSuccessIds[successId] = nowIso();

                const game = String(gameName || details.game || "Game");
                const xp = Math.max(10, Number(details.xp || 50));
                const beforeLevel = Number(profile.level || 1);
                profile.successfulPlays += 1;
                profile.level += 1;
                profile.xp += xp;

                if (!profile.games[game]) profile.games[game] = blankGame();
                profile.games[game].successes = Number(profile.games[game].successes || 0) + 1;
                profile.games[game].bestScore = Math.max(Number(profile.games[game].bestScore || 0), Number(details.score || 0));
                profile.games[game].bestLevel = Math.max(Number(profile.games[game].bestLevel || 0), Number(details.level || 0));
                profile.games[game].lastPlayedAt = nowIso();

                profile.recentActivity.unshift({
                    game,
                    title: details.title || ("Successful " + game + " play"),
                    score: Number(details.score || 0),
                    level: Number(details.level || 0),
                    xp,
                    at: nowIso()
                });
                profile.recentActivity = profile.recentActivity.slice(0, MAX_RECENT);
                saveProfile(profile);
                showToast("Profile Level Up! Lv " + beforeLevel + " → " + profile.level);
                return profile;
            }
            function resetProfile() {
                const profile = defaultProfile();
                saveProfile(profile);
                return profile;
            }
            function xpForNext(level) { return Math.max(50, level * 100); }

            window.GameHubProfile = { PROFILE_KEY, readProfile, saveProfile, recordSuccess, resetProfile, xpForNext };
        })();
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="brand"><span class="logo" aria-hidden="true"></span>Game Hub</div>
            <nav aria-label="Main navigation">
                <a href="homepage.html" class="home-link">← Back Arcade</a>
                <span class="account-pill">
                    👤 <span id="accountName">Player</span>
                    <span class="level-badge" id="accountLevel">LV 1</span>
                </span>
            </nav>
        </header>

        <div id="game-wrapper">
            <div id="game-canvas-container"></div>
            <div id="weather-overlay" aria-hidden="true"></div>

            <div class="hud-stack">
                <div id="game-ui">
                    <p class="score-title">Distance</p>
                    <p class="score-val" id="score">0</p>
                </div>
                <div id="mini-stats">
                    <span class="stat-chip">Best <span id="best-score">0</span></span>
                    <span class="stat-chip">Rank <span id="rank-level">Rookie</span></span>
                    <span class="stat-chip">Idle <span id="idle-count">Safe</span></span>
                    <span class="stat-chip">Theme <span id="theme-label">Auto</span></span>
                </div>
            </div>

            <div id="danger-banner">Keep moving — eagle patrol active</div>
            <div id="instructions">Use <span>WASD</span> or <span>ARROW KEYS</span> to Hop • cross roads, rivers, and rails</div>

            <div id="gameover-screen">
                <div class="go-card">
                    <h2>CRASHED!</h2>
                    <p>Your chicken safe-crossed <span id="final-score" style="color:var(--accent); font-weight:900;">0</span> lines.</p>
                    <p>Rank reached: <span id="final-rank" style="color:var(--accent-2); font-weight:900;">Rookie</span></p>
                    <button class="action-btn" onclick="resetGame()">Hop Again</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const FIREBASE_DB_URL = "https://gamelibrary-882b6-default-rtdb.asia-southeast1.firebasedatabase.app";

        function firebaseSafeKey(value) {
            return String(value || "Player").replace(/[.#$\[\]/]/g, "_").slice(0, 80);
        }

        const RANK_LEVELS = [
            { name: "Mythical", min: 120, icon: "🐉", className: "rank-mythical" },
            { name: "Platinum", min: 90, icon: "💎", className: "rank-platinum" },
            { name: "Gold", min: 65, icon: "🏆", className: "rank-gold" },
            { name: "Silver", min: 40, icon: "🛡️", className: "rank-silver" },
            { name: "Bronze", min: 25, icon: "🥉", className: "rank-bronze" },
            { name: "Rookie", min: 0, icon: "🐣", className: "rank-rookie" }
        ];

        function getRankMeta(distance) {
            const safeDistance = Number(distance) || 0;
            return RANK_LEVELS.find(rank => safeDistance >= rank.min) || RANK_LEVELS[RANK_LEVELS.length - 1];
        }

        function getRankLevel(distance) {
            return getRankMeta(distance).name;
        }

        function renderRankHTML(distance) {
            const rank = getRankMeta(distance);
            return `<span class="rank-emblem ${rank.className}" aria-hidden="true">${rank.icon}</span><span>${rank.name}</span>`;
        }

        function updateRankUI(distance) {
            const rank = getRankMeta(Number(distance) || 0);
            const el = document.getElementById("rank-level");
            if (el) {
                el.className = "rank-display";
                el.innerHTML = renderRankHTML(distance);
                el.setAttribute("aria-label", rank.name + " rank");
            }
            return rank.name;
        }

        function parseMaybeJsonString(value) {
            if (typeof value !== "string") return value;
            try { return JSON.parse(value); }
            catch (err) { return value; }
        }

        function getCurrentProfileLevel() {
            if (window.GameHubProfile && typeof window.GameHubProfile.readProfile === "function") {
                const profile = window.GameHubProfile.readProfile() || {};
                if (profile.level) return Number(profile.level) || 1;
            }
            return Number(localStorage.getItem("gamehub_level") || localStorage.getItem("crossyroad_currentLevel") || 1);
        }

        async function readCurrentLevelFromDatabase(playerName) {
            if (!window.GameHubAuth) return null;
            const safeUser = typeof window.GameHubAuth.safeUsernameKey === "function"
                ? window.GameHubAuth.safeUsernameKey(playerName)
                : String(playerName || "Player").trim().toLowerCase().replace(/[^a-z0-9_]/g, "_");
            const urlFor = typeof window.GameHubAuth.firebaseUrl === "function"
                ? window.GameHubAuth.firebaseUrl
                : (parts) => FIREBASE_DB_URL.replace(/\/$/, "") + "/" + parts.map(encodeURIComponent).join("/") + ".json";

            try {
                const profileRes = await fetch(urlFor(["users", safeUser, "gameData", "gamehub_profile_v1"]));
                if (profileRes.ok) {
                    const rawProfile = parseMaybeJsonString(await profileRes.json());
                    if (rawProfile && typeof rawProfile === "object") {
                        localStorage.setItem("gamehub_profile_v1", JSON.stringify(rawProfile));
                        if (rawProfile.level) return Math.max(1, Number(rawProfile.level) || 1);
                    }
                }
            } catch (err) { console.warn("Profile level read failed:", err); }

            try {
                const levelRes = await fetch(urlFor(["users", safeUser, "gameData", "crossyroad_currentLevel"]));
                if (levelRes.ok) {
                    const rawLevel = parseMaybeJsonString(await levelRes.json());
                    if (rawLevel) return Math.max(1, Number(rawLevel) || 1);
                }
            } catch (err) { console.warn("Crossy level read failed:", err); }

            return null;
        }

        async function syncCurrentLevelFromDatabase(playerName) {
            const dbLevel = await readCurrentLevelFromDatabase(playerName);
            if (dbLevel) return updateAccountLevelUI(dbLevel);
            return updateAccountLevelUI(getCurrentProfileLevel());
        }

        function updateAccountLevelUI(level) {
            const safeLevel = Math.max(1, Number(level) || 1);
            localStorage.setItem("crossyroad_currentLevel", String(safeLevel));
            document.getElementById("accountLevel").textContent = "LV " + safeLevel;
            return safeLevel;
        }

        async function loadCrossyFirebaseProfile(playerName) {
            const key = firebaseSafeKey(playerName);
            try {
                const res = await fetch(`${FIREBASE_DB_URL}/crossyRoad/${key}.json`);
                if (!res.ok) throw new Error(`Firebase read failed: ${res.status}`);
                const data = await res.json();
                if (data && typeof data.bestScore === "number") {
                    const localBest = Number(localStorage.getItem("crossyroad_maxDistance") || 0);
                    const best = Math.max(localBest, data.bestScore);
                    localStorage.setItem("crossyroad_maxDistance", String(best));
                    document.getElementById("best-score").textContent = best;
                    updateRankUI(best);
                }
                const dbProfileLevel = await readCurrentLevelFromDatabase(playerName);
                if (dbProfileLevel) {
                    updateAccountLevelUI(dbProfileLevel);
                } else if (data && data.currentLevel) {
                    updateAccountLevelUI(data.currentLevel);
                } else {
                    updateAccountLevelUI(getCurrentProfileLevel());
                }
            } catch (error) {
                console.warn(error);
                syncCurrentLevelFromDatabase(playerName);
            }
        }

        async function saveCrossyFirebaseScore(playerName, finalScore) {
            const key = firebaseSafeKey(playerName);
            const bestScore = Math.max(Number(localStorage.getItem("crossyroad_maxDistance") || 0), finalScore);
            const currentLevel = updateAccountLevelUI(getCurrentProfileLevel());
            const rankLevel = getRankLevel(bestScore);
            try {
                const payload = {
                    playerName,
                    bestScore,
                    lastScore: finalScore,
                    currentLevel,
                    rankLevel,
                    updatedAt: new Date().toISOString(),
                    game: "Crossy Road"
                };
                const res = await fetch(`${FIREBASE_DB_URL}/crossyRoad/${key}.json`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error(`Firebase write failed: ${res.status}`);
            } catch (error) {
                console.warn(error);
            }
        }

        // Synchronized profile read layer directly matching homepage logic
        const username = window.GameHubAuth ? window.GameHubAuth.username : "Player";
        document.getElementById("accountName").textContent = username;

        if (window.GameHubProfile && typeof window.GameHubProfile.readProfile === "function") {
            const liveProfile = window.GameHubProfile.readProfile();
            if (liveProfile && liveProfile.level) updateAccountLevelUI(liveProfile.level);
        }

        document.getElementById("best-score").textContent = localStorage.getItem("crossyroad_maxDistance") || "0";
        updateRankUI(Number(localStorage.getItem("crossyroad_maxDistance") || 0));
        syncCurrentLevelFromDatabase(username).then(() => loadCrossyFirebaseProfile(username));

        // Post back statistics to user profile upon scoring benchmarks
        function handleLevelUpTracking(finalScore) {
            // Persist: max distance + level ups.
            // Uses localStorage -> GameHubAuth cloud sync (Firebase) just like sudoku/tetris.
            const MAX_DISTANCE_KEY = "crossyroad_maxDistance";
            const LEVEL_KEY = "crossyroad_lastLevel";

            const currentMax = Number(localStorage.getItem(MAX_DISTANCE_KEY) || 0);
            if (finalScore > currentMax) {
                localStorage.setItem(MAX_DISTANCE_KEY, String(finalScore));
                document.getElementById("best-score").textContent = finalScore;
                updateRankUI(finalScore);
            }
            // Track “levels” for the profile (as in your other games)
            if (window.GameHubProfile && typeof window.GameHubProfile.recordSuccess === "function" && finalScore > 5) {
                window.GameHubProfile.recordSuccess("Crossy Road", {
                    successId: "crossyroad-level-" + String(finalScore),
                    score: finalScore,
                    title: "Crossed " + finalScore + " Winter Lanes!",
                    xp: Math.min(150, finalScore * 4),
                    level: Number(localStorage.getItem(LEVEL_KEY) || 0) + 1
                });

                localStorage.setItem(LEVEL_KEY, String(Number((window.GameHubProfile.readProfile()||{}).level || 1)));

                // Live visual reload for headers
                const liveProfile = window.GameHubProfile.readProfile();
                if (liveProfile && liveProfile.level) updateAccountLevelUI(liveProfile.level);
            }

            // Save after profile updates so Firebase receives the current synced level.
            saveCrossyFirebaseScore(username, finalScore);
        }

        function seededRandomFromText(text) {
            let hash = 2166136261;
            for (let i = 0; i < text.length; i++) {
                hash ^= text.charCodeAt(i);
                hash = Math.imul(hash, 16777619);
            }
            return ((hash >>> 0) % 10000) / 10000;
        }

        function getDailyWeatherThemeName(now) {
            const dateKey = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0") + "-" + String(now.getDate()).padStart(2, "0");
            const userSeed = (window.GameHubAuth && window.GameHubAuth.username) || "Player";
            const roll = seededRandomFromText(dateKey + "|crossyroad-weather|" + userSeed);
            if (roll < 0.18) return "rainy";
            if (roll < 0.34) return "summer";
            if (roll < 0.48) return "snow";
            return "day";
        }

        function getSeasonalThemeName() {
            const now = new Date();
            const hour = now.getHours();
            const forced = new URLSearchParams(window.location.search).get("theme") || localStorage.getItem("crossyroad_theme_override");
            if (forced && THEME_PRESETS[String(forced).toLowerCase()]) return String(forced).toLowerCase();

            // Day/night follows the current clock. Weather/season looks are random per calendar day.
            const dailyWeather = getDailyWeatherThemeName(now);
            const isNight = hour < 6 || hour >= 18;
            if (dailyWeather !== "day") return dailyWeather;
            return isNight ? "night" : "day";

        function generateRowStructure(rowIndex) {
            let type = TYPE_SNOW;
            if (rowIndex > 2) {
                const rng = Math.random();
                if (rowIndex < 12) {
                    if (rng < 0.58) type = TYPE_SNOW;
                    else type = TYPE_ROAD;
                } else if (rowIndex < 28) {
                    if (rng < 0.42) type = TYPE_SNOW;
                    else if (rng < 0.76) type = TYPE_ROAD;
                    else type = TYPE_RIVER;
                } else if (rowIndex < 55) {
                    if (rng < 0.30) type = TYPE_SNOW;
                    else if (rng < 0.62) type = TYPE_ROAD;
                    else if (rng < 0.82) type = TYPE_RIVER;
                    else type = TYPE_RAIL;
                } else {
                    if (rng < 0.20) type = TYPE_SNOW;
                    else if (rng < 0.52) type = TYPE_ROAD;
                    else if (rng < 0.72) type = TYPE_RIVER;
                    else type = TYPE_RAIL;
                }
            }

            const rowGroup = new THREE.Group();
            rowGroup.position.set(0, 0, -rowIndex); 

            let geo, mat, width = 60;
            if (type === TYPE_SNOW) {
                geo = new THREE.BoxGeometry(width, 1, 1);
                mat = material(activeTheme.snow);
            } else if (type === TYPE_ROAD) {
                geo = new THREE.BoxGeometry(width, 0.94, 1);
                mat = material(activeTheme.road);
            } else if (type === TYPE_RIVER) {
                geo = new THREE.BoxGeometry(width, 0.78, 1);
                mat = material(activeTheme.river);
            } else if (type === TYPE_RAIL) {
                geo = new THREE.BoxGeometry(width, 0.92, 1);
                mat = material(activeTheme.rail);
            }

            const ground = new THREE.Mesh(geo, mat);
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            rowGroup.add(ground);

            let speed = 0, direction = Math.random() > 0.5 ? 1 : -1;

            const difficulty = Math.min(1, Math.max(0, rowIndex / 120));
            const blockedCells = new Set();

            if (type === TYPE_ROAD) {
                speed = 1.25 + difficulty * 3.1 + Math.random() * (0.85 + difficulty * 1.4);
                // Subtle road markers
                for (let i = -20; i <= 20; i += 4) {
                    const line = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.02, 0.15), new THREE.MeshLambertMaterial({ color: 0x3e4257 }));
                    line.position.set(i, -0.02, 0);
                    rowGroup.add(line);
                }
            } else if (type === TYPE_RIVER) {
                speed = 0.85 + difficulty * 1.6 + Math.random() * 0.75;
            } else if (type === TYPE_RAIL) {
                speed = 3.8 + difficulty * 4.5 + Math.random() * 1.8;
                for (let i = -25; i <= 25; i += 1.4) {
                    const sleeper = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.06, 0.82), new THREE.MeshLambertMaterial({ color: 0x2a1e19 }));
                    sleeper.position.set(i, 0.02, 0);
                    rowGroup.add(sleeper);
                }
                [-0.25, 0.25].forEach(z => {
                    const rail = new THREE.Mesh(new THREE.BoxGeometry(width, 0.08, 0.08), new THREE.MeshLambertMaterial({ color: 0xb9c0c8 }));
                    rail.position.set(0, 0.08, z);
                    rail.castShadow = true;
                    rowGroup.add(rail);
                });
            } else if (type === TYPE_SNOW && rowIndex > 0) {
                const treeChance = Math.min(0.64, 0.20 + difficulty * 0.28);
                for (let gridX = -7; gridX <= 7; gridX++) {
                    const keepPathOpen = Math.abs(gridX) <= 1 && rowIndex < 10;
                    if (!keepPathOpen && Math.random() < treeChance) {
                        const pine = buildWinterTree();
                        pine.position.x = gridX;
                        rowGroup.add(pine);
                        blockedCells.add(gridX);
                    }
                }
            }

            scene.add(rowGroup);
            const spawnInterval = Math.max(0.65, 2.4 - difficulty * 1.25 + Math.random() * (1.0 - difficulty * 0.35));
            rows[rowIndex] = { index: rowIndex, type: type, speed: speed, direction: direction, lastSpawned: 0, spawnInterval: spawnInterval, blockedCells: Array.from(blockedCells) };
            rowObjects[rowIndex] = rowGroup;
        }

            body.castShadow = body.receiveShadow = true;
            car.add(body);
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.34, 0.62), glassMat);
            cabin.position.set(-0.08, 0.68, 0);
            cabin.castShadow = true;
            car.add(cabin);
            [-0.55, 0.55].forEach(x => [-0.42, 0.42].forEach(z => {
                const wheel = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.26, 0.12), darkMat);
                wheel.position.set(x, 0.16, z);
                wheel.castShadow = true;
                car.add(wheel);
            }));
            const headlightMat = new THREE.MeshLambertMaterial({ color: 0xfff3a1 });
            [-0.22, 0.22].forEach(z => {
                const light = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.12, 0.12), headlightMat);
                light.position.set(0.86, 0.36, z);
                car.add(light);
            });
            return car;
        }

        function buildTrainModel() {
            const train = new THREE.Group();
            const bodyMat = new THREE.MeshLambertMaterial({ color: 0xdc2f55 });
            const stripeMat = new THREE.MeshLambertMaterial({ color: 0xf8fafc });
            const glassMat = new THREE.MeshLambertMaterial({ color: 0x88d8ff });
            const body = new THREE.Mesh(new THREE.BoxGeometry(4.4, 0.82, 0.82), bodyMat);
            body.position.y = 0.45;
            body.castShadow = body.receiveShadow = true;
            train.add(body);
            const stripe = new THREE.Mesh(new THREE.BoxGeometry(4.45, 0.12, 0.86), stripeMat);
            stripe.position.y = 0.55;
            train.add(stripe);
            for (let x=-1.55; x<=1.55; x+=0.75) {
                const windowMesh = new THREE.Mesh(new THREE.BoxGeometry(0.36, 0.24, 0.05), glassMat);
                windowMesh.position.set(x, 0.78, -0.43);
                train.add(windowMesh);
            }
            const nose = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.58, 0.72), new THREE.MeshLambertMaterial({ color: 0xff6b83 }));
            nose.position.set(2.35, 0.45, 0);
            nose.castShadow = true;
            train.add(nose);
            return train;
        }

        function generateCarUnit(rowIndex) {
            const data = rows[rowIndex];
            const carColors = [0xff5d7a, 0x50f4ff, 0xc77dff, 0xffb65d, 0x5dff99];
            const mesh = buildCarModel(carColors[Math.floor(Math.random() * carColors.length)]);
            mesh.castShadow = mesh.receiveShadow = true;
            mesh.rotation.y = data.direction > 0 ? 0 : Math.PI;
            mesh.position.set(data.direction > 0 ? -24 : 24, 0, 0);
            rowObjects[rowIndex].add(mesh);
            cars.push({ mesh: mesh, row: rowIndex, hitWidth: 1.05 });
        }

        function generateTrainUnit(rowIndex) {
            const data = rows[rowIndex];
            const mesh = buildTrainModel();
            mesh.rotation.y = data.direction > 0 ? 0 : Math.PI;
            mesh.position.set(data.direction > 0 ? -26 : 26, 0, 0);
            rowObjects[rowIndex].add(mesh);
            cars.push({ mesh: mesh, row: rowIndex, hitWidth: 2.45 });
        }

        function generateIceUnit(rowIndex) {
            const data = rows[rowIndex];
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.22, 0.85), new THREE.MeshLambertMaterial({ color: 0xddf7ff, transparent: true, opacity: 0.85 }));
            mesh.castShadow = mesh.receiveShadow = true;
            mesh.position.set(data.direction > 0 ? -24 : 24, -0.11, 0);
            rowObjects[rowIndex].add(mesh);
            logs.push({ mesh: mesh, row: rowIndex });
        }

        function engineLoop() {
            if (isGameOver) return;

            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();
            updateIdlePredator(delta, elapsed);
            updateRainParticles(delta);

            // Procedural Infinite Row Spawning
            while (rows.length < playerForwardIndex + 30) {
                generateRowStructure(rows.length);
            }

            rows.forEach(row => {
                if (!row) return;
                if ((row.type === TYPE_ROAD || row.type === TYPE_RIVER || row.type === TYPE_RAIL) && (elapsed - row.lastSpawned > row.spawnInterval)) {
                    if (row.type === TYPE_ROAD) generateCarUnit(row.index);
                    else if (row.type === TYPE_RAIL) generateTrainUnit(row.index);
                    else generateIceUnit(row.index);
                    row.lastSpawned = elapsed;
                }
            });

            // Update Vehicle Vectors
            for (let i = cars.length - 1; i >= 0; i--) {
                const car = cars[i];
                const activeRow = rows[car.row];
                car.mesh.position.x += activeRow.speed * activeRow.direction * delta;

                if (playerForwardIndex === car.row && !isJumping) {
                    if (Math.abs(playerSideIndex - car.mesh.position.x) < (car.hitWidth || 1.05)) triggerCollision();
                }
                if (Math.abs(car.mesh.position.x) > 26) {
                    rowObjects[car.row].remove(car.mesh);
                    cars.splice(i, 1);
                }
            }

            // Update Ice Log Vectors
            let currentCarrier = null;
            for (let i = logs.length - 1; i >= 0; i--) {
                const log = logs[i];
                const activeRow = rows[log.row];
                log.mesh.position.x += activeRow.speed * activeRow.direction * delta;

                if (playerForwardIndex === log.row && !isJumping) {
                    if (Math.abs(playerSideIndex - log.mesh.position.x) < 1.4) currentCarrier = log;
                }
                if (Math.abs(log.mesh.position.x) > 26) {
                    rowObjects[log.row].remove(log.mesh);
                    logs.splice(i, 1);
                }
            }

            // Animation Vector Calculation
            if (isJumping) {
                jumpProgress += delta * 13.5;
                if (jumpProgress >= 1) {
                    jumpProgress = 1;
                    isJumping = false;
                }
                const lx = THREE.MathUtils.lerp(jumpStartX, targetX, jumpProgress);
                const lz = THREE.MathUtils.lerp(jumpStartZ, targetZ, jumpProgress);
                const ly = 0.375 + Math.sin(jumpProgress * Math.PI) * 0.75;
                chicken.position.set(lx, ly, lz);
            } else {
                if (rows[playerForwardIndex] && rows[playerForwardIndex].type === TYPE_RIVER) {
                    if (currentCarrier) {
                        const activeRow = rows[currentCarrier.row];
                        playerSideIndex += activeRow.speed * activeRow.direction * delta;
                        chicken.position.x = playerSideIndex;
                        chicken.position.z = -playerForwardIndex;
                        if (Math.abs(playerSideIndex) > 7.5) triggerCollision();
                    } else {
                        chicken.position.y = -0.4;
                        triggerCollision();
                    }
                } else {
                    chicken.position.x = THREE.MathUtils.lerp(chicken.position.x, playerSideIndex, 0.25);
                    chicken.position.z = THREE.MathUtils.lerp(chicken.position.z, -playerForwardIndex, 0.25);
                    chicken.position.y = THREE.MathUtils.lerp(chicken.position.y, 0.375, 0.25);
                }
            }

            // TRUE ISOMETRIC CAMERA FOLLOWER MESH
            const camTargetX = chicken.position.x + 8.5;
            const camTargetZ = chicken.position.z + 8.5;
            camera.position.x = THREE.MathUtils.lerp(camera.position.x, camTargetX, 0.08);
            camera.position.z = THREE.MathUtils.lerp(camera.position.z, camTargetZ, 0.08);

            renderer.render(scene, camera);
        }


        function updateIdlePredator(delta, elapsed) {
            const idleFor = elapsed - lastMoveTime;
            const idleEl = document.getElementById('idle-count');
            const dangerEl = document.getElementById('danger-banner');

            if (!eagle) return;

            if (idleFor < IDLE_WARNING_SECONDS) {
                eagle.visible = false;
                eagleAttackStarted = false;
                if (idleEl) idleEl.textContent = 'Safe';
                if (dangerEl && elapsed >= blockedMessageUntil) dangerEl.textContent = 'Keep moving — eagle patrol active';
                return;
            }

            const remaining = Math.max(0, Math.ceil(IDLE_CATCH_SECONDS - idleFor));
            if (idleEl) idleEl.textContent = remaining + 's';
            if (dangerEl && elapsed >= blockedMessageUntil) dangerEl.textContent = 'Move now — eagle incoming';

            eagle.visible = true;
            const attackProgress = THREE.MathUtils.clamp((idleFor - IDLE_WARNING_SECONDS) / (IDLE_CATCH_SECONDS - IDLE_WARNING_SECONDS), 0, 1);
            const startX = chicken.position.x - 3.2;
            const startY = 6.3;
            const startZ = chicken.position.z + 4.2;
            const endX = chicken.position.x;
            const endY = chicken.position.y + 0.35;
            const endZ = chicken.position.z;
            eagle.position.set(
                THREE.MathUtils.lerp(startX, endX, attackProgress),
                THREE.MathUtils.lerp(startY, endY, attackProgress),
                THREE.MathUtils.lerp(startZ, endZ, attackProgress)
            );
            eagle.rotation.y = Math.PI / 4;
            eagle.rotation.z = Math.sin(elapsed * 12) * 0.18;

            if (idleFor >= IDLE_CATCH_SECONDS) {
                triggerCollision('eagle');
            }
        }

        function isBlockedCell(rowIndex, sideIndex) {
            const row = rows[rowIndex];
            if (!row || !Array.isArray(row.blockedCells)) return false;
            return row.blockedCells.includes(Math.round(sideIndex));
        }

        function showBlockedHopWarning() {
            const dangerEl = document.getElementById('danger-banner');
            blockedMessageUntil = clock ? clock.getElapsedTime() + 0.9 : 0;
            if (dangerEl) dangerEl.textContent = 'Tree blocked — choose another tile';
            if (renderer && renderer.domElement) {
                renderer.domElement.classList.remove('blocked-hop');
                void renderer.domElement.offsetWidth;
                renderer.domElement.classList.add('blocked-hop');
            }
        }

        function processInput(event) {
            if (isGameOver || isJumping) return;

            let flag = false;
            jumpStartX = chicken.position.x;
            jumpStartZ = chicken.position.z;

            let nextF = playerForwardIndex;
            let nextS = playerSideIndex;

            switch (event.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    nextF = playerForwardIndex + 1;
                    chicken.rotation.y = 0; // Point forward up-right
                    flag = true;
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (playerForwardIndex > 0) {
                        nextF = playerForwardIndex - 1;
                        chicken.rotation.y = Math.PI;
                        flag = true;
                    }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (playerSideIndex > -7) {
                        nextS = Math.round(playerSideIndex) - 1;
                        chicken.rotation.y = Math.PI / 2;
                        flag = true;
                    }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (playerSideIndex < 7) {
                        nextS = Math.round(playerSideIndex) + 1;
                        chicken.rotation.y = -Math.PI / 2;
                        flag = true;
                    }
                    break;
            }

            if (flag && isBlockedCell(nextF, nextS)) {
                showBlockedHopWarning();
                flag = false;
            }

            if (flag) {
                lastMoveTime = clock.getElapsedTime();
                eagleAttackStarted = false;
                if (eagle) eagle.visible = false;
                playerForwardIndex = nextF;
                playerSideIndex = nextS;
                targetX = playerSideIndex;
                targetZ = -playerForwardIndex;
                isJumping = true;
                jumpProgress = 0;

                if (playerForwardIndex > currentMaxRow) {
                    currentMaxRow = playerForwardIndex;
                    score = currentMaxRow;
                    document.getElementById('score').innerText = score;
                    updateRankUI(score);
                }
            }
        }

        function triggerCollision(reason) {
            isGameOver = true;
            if (reason === 'eagle') {
                const heading = document.querySelector('.go-card h2');
                if (heading) heading.textContent = 'SNATCHED!';
            } else {
                const heading = document.querySelector('.go-card h2');
                if (heading) heading.textContent = 'CRASHED!';
            }
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-rank').className = 'rank-display';
            document.getElementById('final-rank').innerHTML = renderRankHTML(score);
            document.getElementById('gameover-screen').style.display = 'flex';
            handleLevelUpTracking(score);
        }

        function resetGame() {
            cars.forEach(c => { if (c.mesh.parent) c.mesh.parent.remove(c.mesh); });
            logs.forEach(l => { if (l.mesh.parent) l.mesh.parent.remove(l.mesh); });
            rowObjects.forEach(o => scene.remove(o));

            cars = []; logs = []; rows = []; rowObjects = [];
            playerForwardIndex = 0; playerSideIndex = 0;
            targetX = 0; targetZ = 0; currentMaxRow = 0; score = 0;
            isJumping = false; isGameOver = false;
            lastMoveTime = clock.getElapsedTime();
            eagleAttackStarted = false;
            blockedMessageUntil = 0;
            if (eagle) eagle.visible = false;

            document.getElementById('score').innerText = "0";
            updateRankUI(Number(localStorage.getItem("crossyroad_maxDistance") || 0));
            document.getElementById('idle-count').innerText = "Safe";
            document.getElementById('gameover-screen').style.display = 'none';

            chicken.position.set(0, 0.375, 0);
            chicken.rotation.y = 0;

            for (let i = 0; i < 40; i++) {
                generateRowStructure(i);
            }
            camera.position.set(8.5, 9.5, 8.5);
            clock.getDelta();
        }

        function handleResizeResize() {
            const aspect = container.clientWidth / container.clientHeight;
            camera.left = -zoomLevel * aspect;
            camera.right = zoomLevel * aspect;
            camera.top = zoomLevel;
            camera.bottom = -zoomLevel;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // Engage engine on load
        window.onload = () => {
            setActiveTheme(getSeasonalThemeName());
            initEngine();
            renderer.setAnimationLoop(engineLoop);
        };
    </script>
</body>
</html>
