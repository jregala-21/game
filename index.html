<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Vault</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #0f172a;
    color: #fff;
    overflow: hidden;
}

/* Viewer */
.viewer {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    height: 100vh;
}

/* Card */
.card {
    min-width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    align-items: center;
}

/* ✅ AUTO ZOOM IMAGE (NO BLACK BARS) */
.card img {
    width: 70%;
    height: 65vh;
    object-fit: cover;
    border-radius: 15px;
}

/* Text */
.label {
    font-size: 18px;
    font-weight: bold;
}

/* Button */
.open-btn {
    padding: 12px 20px;
    background: #22c55e;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 16px;
}

/* FAB */
.fab {
    position: fixed;
    bottom: 20px;
    right: 18px;
    font-size: 22px;
    color: #22c55e;
    background: transparent;
    border: none;
    opacity: 0;
    transition: opacity 0.4s;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: .3s;
}

.modal.active {
    opacity: 1;
    pointer-events: auto;
}

.modal-box {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 350px;
    animation: pop .25s ease;
}

@keyframes pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

select, input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: none;
}

.btn {
    background: #22c55e;
    padding: 12px;
    text-align: center;
    border-radius: 10px;
    margin-top: 10px;
}

/* Scanner */
#reader {
    width: 100%;
    display: none;
    margin-bottom: 10px;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    padding: 12px 20px;
    border-radius: 10px;
    opacity: 0;
    transition: .3s;
}

.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="viewer" id="viewer"></div>

<button class="fab" onclick="openModal()">+</button>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal(event)">
    <div class="modal-box">

        <!-- Scanner -->
        <div id="reader"></div>

        <select id="bank">
            <option value="">Select Bank</option>
            <option value="gcash">GCash</option>
            <option value="maya">Maya</option>
            <option value="bpi">BPI</option>
            <option value="unionbank">UnionBank</option>
            <option value="maribank">Maribank</option>
            <option value="tonik">Tonik</option>
            <option value="gotyme">GoTyme</option>
            <option value="bdo">BDO</option>
        </select>

        <input type="file" id="file" accept="image/*">

        <div class="btn" onclick="startScan()">📷 Scan QR</div>
        <div class="btn" onclick="upload()">Save QR</div>

    </div>
</div>

<div class="toast" id="toast"></div>

<script>
let data = JSON.parse(localStorage.getItem("qr")) || [];
let scanner;

function save(){ localStorage.setItem("qr", JSON.stringify(data)); }

function render(){
    const viewer = document.getElementById("viewer");
    viewer.innerHTML = "";

    data.forEach(q=>{
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${q.image}">
            <div class="label">${q.bank.toUpperCase()}</div>
            <button class="open-btn">Open App</button>
        `;

        div.querySelector(".open-btn").onclick = ()=>{
            openApp(q.bank);
        };

        viewer.appendChild(div);
    });
}

/* MODAL */
function openModal(){
    document.getElementById("modal").classList.add("active");
}

function closeModal(e){
    if(e.target.id === "modal"){
        document.getElementById("modal").classList.remove("active");
        stopScanner();
    }
}

/* 📷 START SCANNER */
function startScan(){
    const reader = document.getElementById("reader");
    reader.style.display = "block";

    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
    );
}

/* ✅ SCAN SUCCESS */
function onScanSuccess(decodedText, result){

    scanner.stop();

    const video = document.querySelector("video");
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    const img = canvas.toDataURL("image/png");

    /* 💾 AUTO DOWNLOAD */
    const link = document.createElement("a");
    link.href = img;
    link.download = "qrph.png";
    link.click();

    /* SAVE LOCALLY */
    const bank = document.getElementById("bank").value || "gcash";
    data.push({bank, image: img});
    save();
    render();

    showMessage("QR saved! Now choose bank");

    /* AUTO OPEN BANK IF SELECTED */
    if(bank){
        openApp(bank);
    }
}

function stopScanner(){
    if(scanner){
        scanner.stop();
    }
}

/* UPLOAD */
function upload(){
    const file = document.getElementById("file").files[0];
    const bank = document.getElementById("bank").value;

    if(!file || !bank){
        showMessage("Complete all fields");
        return;
    }

    const reader = new FileReader();
    reader.onload = e=>{
        data.push({bank, image:e.target.result});
        save();
        render();
        document.getElementById("modal").classList.remove("active");
    };
    reader.readAsDataURL(file);
}

/* OPEN APP */
function openApp(bank){
    const links={
        gcash:"gcash://",
        maya:"maya://",
        bpi:"bpi://",
        unionbank:"unionbank://",
        maribank:"maribank://",
        tonik:"tonik://",
        gotyme:"gotyme://",
        bdo:"bdo://"
    };

    const url = links[bank];

    if(!url){
        showMessage("App not supported");
        return;
    }

    setTimeout(()=>{
        showMessage("If app didn’t open, install it or upload QR manually");
    },1200);

    window.location.href = url;
}

/* TOAST */
function showMessage(msg){
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");

    setTimeout(()=>t.classList.remove("show"), 2500);
}

/* FAB AUTO HIDE */
let fab = document.querySelector(".fab");
let timer;

function showFab(){
    fab.style.opacity = "1";
    clearTimeout(timer);
    timer = setTimeout(()=> fab.style.opacity="0", 1500);
}

["touchstart","touchmove","scroll","mousemove"].forEach(e=>{
    document.addEventListener(e, showFab);
});

window.addEventListener("load", showFab);
// Navigation state
let currentIndex = 0;

function scrollToIndex(index){
    const viewer = document.getElementById('viewer');
    const cards = viewer.querySelectorAll('.card');
    if(cards.length === 0) return;
    const idx = Math.max(0, Math.min(index, cards.length - 1));
    currentIndex = idx;
    cards[idx].scrollIntoView({ behavior: 'smooth', inline: 'start' });
}

function nextCard(){ scrollToIndex(currentIndex + 1); }
function prevCard(){ scrollToIndex(currentIndex - 1); }

// Keyboard navigation (single press moves one card)
window.addEventListener('keydown', (e)=>{
    if(e.key === 'ArrowRight') { e.preventDefault(); nextCard(); }
    if(e.key === 'ArrowLeft') { e.preventDefault(); prevCard(); }
});

// Touch swipe navigation for mobile
(function(){
    const viewer = document.getElementById('viewer');
    let startX = 0;
    viewer.addEventListener('touchstart', (ev)=>{ startX = ev.changedTouches[0].clientX; }, {passive:true});
    viewer.addEventListener('touchend', (ev)=>{
        const endX = ev.changedTouches[0].clientX;
        const dx = startX - endX;
        if(Math.abs(dx) > 50){ if(dx > 0) nextCard(); else prevCard(); }
    }, {passive:true});
})();

// Ensure render positions to currentIndex after build
const originalRender = render;
render = function(){
    originalRender();
    // clamp index
    const viewer = document.getElementById('viewer');
    const cards = viewer.querySelectorAll('.card');
    if(cards.length === 0) return;
    if(currentIndex >= cards.length) currentIndex = cards.length - 1;
    // small timeout to allow layout
    setTimeout(()=> scrollToIndex(currentIndex), 50);
};

render();
</script>

</body>
</html>
